{{/*
  CronJobs can be defined in two places:
  1. Root level: .Values.cronJobs (standalone, optional fromDeployment for image)
  2. Inside deployments: .Values.deployments.<name>.cronJobs (inherits image, configMap, secret, SA from deployment)
*/}}

{{- $root := . }}

{{/* ====== PART 1: Root-level cronJobs ====== */}}
{{- if .Values.cronJobs }}
{{- range $name, $job := .Values.cronJobs }}
{{- if $job }}
{{- $fullname := include "global-chart.fullname" $root }}
{{- /* CronJob names limited to 52 chars (Jobs add 11-char timestamp suffix) */ -}}
{{- $jobFullname := printf "%s-%s" $fullname $name | trunc 52 | trimSuffix "-" }}

{{- /* Resolve image: explicit > fromDeployment > error */ -}}
{{- $jobImage := "" }}
{{- if hasKey $job "image" }}
  {{- $jobImage = include "global-chart.imageString" (dict "image" $job.image "global" $root.Values.global) -}}
{{- else if $job.fromDeployment }}
  {{- $depName := $job.fromDeployment -}}
  {{- $deploy := index $root.Values.deployments $depName -}}
  {{- if not $deploy -}}
    {{- fail (printf "cronJobs.%s.fromDeployment references deployment '%s' which does not exist in .Values.deployments" $name $depName) -}}
  {{- end -}}
  {{- $jobImage = include "global-chart.imageString" (dict "image" $deploy.image "global" $root.Values.global) -}}
{{- end }}
{{- $imageRef := required (printf "image is required for cronJobs.%s (set cronJobs.%s.image or cronJobs.%s.fromDeployment)" $name $name $name) $jobImage }}

{{- /* ServiceAccount - create own or use explicit name */ -}}
{{- $saCreate := and (hasKey $job "serviceAccount") (hasKey $job.serviceAccount "create") $job.serviceAccount.create }}
{{- $saName := ternary (default $jobFullname $job.serviceAccountName) $jobFullname (hasKey $job "serviceAccountName") }}
{{- if $saCreate }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $saName }}
  namespace: {{ $root.Release.Namespace | quote }}
  labels:
    {{- include "global-chart.labels" $root | nindent 4 }}
  {{- if or (include "global-chart.renderCommonAnnotations" $root) $job.serviceAccountAnnotations }}
  annotations:
    {{- with (include "global-chart.renderCommonAnnotations" $root) }}
    {{- . | nindent 4 }}
    {{- end }}
    {{- with $job.serviceAccountAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
automountServiceAccountToken: {{ ternary $job.automountServiceAccountToken true (hasKey $job "automountServiceAccountToken") }}
{{- end }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $jobFullname }}
  labels:
    {{- include "global-chart.labels" $root | nindent 4 }}
  {{- if or (include "global-chart.renderCommonAnnotations" $root) $job.annotations }}
  annotations:
    {{- with (include "global-chart.renderCommonAnnotations" $root) }}
    {{- . | nindent 4 }}
    {{- end }}
    {{- with $job.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  schedule: {{ $job.schedule | quote }}
  concurrencyPolicy: {{ ternary $job.concurrencyPolicy "Forbid" (hasKey $job "concurrencyPolicy") | quote }}
  successfulJobsHistoryLimit: {{ ternary $job.successfulJobsHistoryLimit 2 (hasKey $job "successfulJobsHistoryLimit") }}
  failedJobsHistoryLimit: {{ ternary $job.failedJobsHistoryLimit 2 (hasKey $job "failedJobsHistoryLimit") }}
  jobTemplate:
    metadata:
      {{- with (include "global-chart.renderCommonAnnotations" $root) }}
      annotations:
        {{- . | nindent 8 }}
      {{- end }}
    spec:
      template:
        metadata:
          {{- with (include "global-chart.renderCommonAnnotations" $root) }}
          annotations:
            {{- . | nindent 12 }}
          {{- end }}
        spec:
          {{- /* ImagePullSecrets: job-level > global (hasKey distinguishes unset from empty) */ -}}
          {{- $cronImagePullSecrets := list -}}
          {{- if hasKey $job "imagePullSecrets" -}}
            {{- $cronImagePullSecrets = $job.imagePullSecrets -}}
          {{- else -}}
            {{- $global := default (dict) $root.Values.global -}}
            {{- $cronImagePullSecrets = $global.imagePullSecrets -}}
          {{- end -}}
          {{- with (include "global-chart.renderImagePullSecrets" $cronImagePullSecrets) }}
{{- . | nindent 10 }}
          {{- end }}
          {{- with $job.hostAliases }}
          hostAliases:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $job.podSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with (include "global-chart.renderDnsConfig" $job.dnsConfig) }}
{{- . | nindent 10 }}
          {{- end }}
          {{- if $job.initContainers }}
          initContainers:
            {{- toYaml $job.initContainers | nindent 12 }}
          {{- end }}
          containers:
          - name: {{ $name }}
            image: {{ $imageRef | quote }}
            imagePullPolicy: {{ include "global-chart.imagePullPolicy" (dict "override" $job.imagePullPolicy "image" $job.image) | quote }}
            {{- if $job.command }}
            command:
              {{- toYaml $job.command | nindent 14 }}
            {{- end }}
            {{- if $job.args }}
            args:
              {{- toYaml $job.args | nindent 14 }}
            {{- end }}
            {{- with $job.securityContext }}
            securityContext:
              {{- toYaml . | nindent 14 }}
            {{- end }}
            {{- if or $job.envFromConfigMaps $job.envFromSecrets }}
            envFrom:
              {{- range $cm := $job.envFromConfigMaps }}
              - configMapRef:
                  name: {{ $cm | quote }}
              {{- end }}
              {{- range $sec := $job.envFromSecrets }}
              - secretRef:
                  name: {{ $sec | quote }}
              {{- end }}
            {{- end }}
            {{- if $job.env }}
            env:
              {{- toYaml $job.env | nindent 14 }}
            {{- end }}
            {{- with (include "global-chart.renderResources" (dict "resources" $job.resources "hasResources" (hasKey $job "resources") "defaults" $root.Values.defaults)) }}
{{- . | nindent 12 }}
            {{- end }}
            {{- with $job.volumeMounts }}
            volumeMounts:
              {{- toYaml . | nindent 14 }}
            {{- end }}
          {{- with $job.volumes }}
          volumes:
            {{- range . }}
            {{- include "global-chart.renderVolume" . | nindent 12 }}
            {{- end }}
          {{- end }}
          serviceAccountName: {{ $saName | quote }}
          {{- with $job.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $job.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $job.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          restartPolicy: {{ ternary $job.restartPolicy "Never" (hasKey $job "restartPolicy") | quote }}
{{- end }}
{{- end }}
{{- end }}

{{/* ====== PART 2: Deployment-level cronJobs (inherit from deployment) ====== */}}
{{- range $deployName, $deploy := .Values.deployments }}
{{- if $deploy }}
{{- if and (eq (include "global-chart.deploymentEnabled" (dict "deploy" $deploy)) "true") $deploy.cronJobs }}
{{- range $name, $job := $deploy.cronJobs }}
{{- if $job }}

{{- /* Build cronjob fullname with deployment name for uniqueness */ -}}
{{- /* CronJob names limited to 52 chars (Jobs add 11-char timestamp suffix) */ -}}
{{- $jobFullname := printf "%s-%s-%s" (include "global-chart.fullname" $root) $deployName $name | trunc 52 | trimSuffix "-" }}

{{- /* Resolve image: explicit in cronjob > inherited from deployment */ -}}
{{- $jobImage := "" }}
{{- if hasKey $job "image" }}
  {{- $jobImage = include "global-chart.imageString" (dict "image" $job.image "global" $root.Values.global) -}}
{{- else }}
  {{- $jobImage = include "global-chart.imageString" (dict "image" $deploy.image "global" $root.Values.global) -}}
{{- end }}
{{- $imageRef := required (printf "image is required for deployments.%s.cronJobs.%s" $deployName $name) $jobImage }}

{{- /* ServiceAccount: explicit > inherited from deployment > default */ -}}
{{- $deploySA := default (dict) $deploy.serviceAccount -}}
{{- $jobSAMap := (and (hasKey $job "serviceAccount") (kindIs "map" $job.serviceAccount)) | ternary $job.serviceAccount (dict) -}}
{{- $jobSAExplicitName := coalesce $job.serviceAccountName $jobSAMap.name -}}

{{- /* Use deployment's SA name if it exists, otherwise cronjob's own SA */ -}}
{{- $deploymentSAName := "" -}}
{{- if $deploySA.create -}}
  {{- $deploymentSAName = include "global-chart.deploymentServiceAccountName" (dict "root" $root "deploymentName" $deployName "deployment" $deploy) -}}
{{- end -}}

{{- $saName := "" -}}
{{- $saCreate := false -}}
{{- if $jobSAExplicitName -}}
  {{- $saName = $jobSAExplicitName -}}
{{- else if $deploymentSAName -}}
  {{- /* Inherit from deployment's service account */ -}}
  {{- $saName = $deploymentSAName -}}
{{- else -}}
  {{- /* Create cronjob-specific SA */ -}}
  {{- $saName = $jobFullname -}}
  {{- $saCreate = true -}}
{{- end -}}

{{- /* Override saCreate if explicitly set in job */ -}}
{{- if hasKey $jobSAMap "create" -}}
  {{- $saCreate = $jobSAMap.create -}}
  {{- if $saCreate -}}
    {{- $saName = ternary $jobSAMap.name $jobFullname (hasKey $jobSAMap "name") -}}
  {{- end -}}
{{- end -}}

{{- $saAutomount := true -}}
{{- if hasKey $job "automountServiceAccountToken" -}}
  {{- $saAutomount = $job.automountServiceAccountToken -}}
{{- end -}}
{{- if hasKey $jobSAMap "automount" -}}
  {{- $saAutomount = $jobSAMap.automount -}}
{{- end -}}
{{- $saAnnotations := $job.serviceAccountAnnotations -}}
{{- if hasKey $jobSAMap "annotations" -}}
  {{- $saAnnotations = $jobSAMap.annotations -}}
{{- end -}}

{{- /* Create SA only if needed (not using deployment's or explicit existing) */ -}}
{{- if $saCreate }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $saName }}
  namespace: {{ $root.Release.Namespace | quote }}
  labels:
    {{- include "global-chart.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $deployName }}
  {{- if or (include "global-chart.renderCommonAnnotations" $root) $saAnnotations }}
  annotations:
    {{- with (include "global-chart.renderCommonAnnotations" $root) }}
    {{- . | nindent 4 }}
    {{- end }}
    {{- with $saAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
automountServiceAccountToken: {{ $saAutomount }}
{{ end -}}

{{- $deployFullname := include "global-chart.deploymentFullname" (dict "root" $root "deploymentName" $deployName) -}}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $jobFullname }}
  labels:
    {{- include "global-chart.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $deployName }}
  {{- if or (include "global-chart.renderCommonAnnotations" $root) $job.annotations }}
  annotations:
    {{- with (include "global-chart.renderCommonAnnotations" $root) }}
    {{- . | nindent 4 }}
    {{- end }}
    {{- with $job.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  schedule: {{ $job.schedule | quote }}
  concurrencyPolicy: {{ ternary $job.concurrencyPolicy "Forbid" (hasKey $job "concurrencyPolicy") | quote }}
  successfulJobsHistoryLimit: {{ ternary $job.successfulJobsHistoryLimit 2 (hasKey $job "successfulJobsHistoryLimit") }}
  failedJobsHistoryLimit: {{ ternary $job.failedJobsHistoryLimit 2 (hasKey $job "failedJobsHistoryLimit") }}
  jobTemplate:
    metadata:
      {{- with (include "global-chart.renderCommonAnnotations" $root) }}
      annotations:
        {{- . | nindent 8 }}
      {{- end }}
    spec:
      template:
        metadata:
          {{- with (include "global-chart.renderCommonAnnotations" $root) }}
          annotations:
            {{- . | nindent 12 }}
          {{- end }}
        spec:
          {{- $ctx := dict "root" $root "job" $job "deploy" $deploy "saName" $saName "imageRef" $imageRef "containerName" $name "configMapRef" $deployFullname "secretRef" $deployFullname "inheritDnsConfig" true "renderInitContainers" true }}
          {{- include "global-chart.inheritedJobPodSpec" $ctx | trimPrefix "\n" | nindent 10 }}
{{ end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
