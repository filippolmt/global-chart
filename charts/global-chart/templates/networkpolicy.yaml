{{- $root := . }}
{{- range $name, $deploy := .Values.deployments }}
{{- if $deploy }}
{{- if eq (include "global-chart.deploymentEnabled" (dict "deploy" $deploy)) "true" }}
{{- $np := default (dict) $deploy.networkPolicy }}
{{- if $np.enabled }}
{{- $depFullname := include "global-chart.deploymentFullname" (dict "root" $root "deploymentName" $name) }}
{{- $labelCtx := dict "root" $root "deploymentName" $name }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $depFullname }}
  labels:
    {{- include "global-chart.deploymentLabels" $labelCtx | nindent 4 }}
  {{- with (include "global-chart.renderCommonAnnotations" $root) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "global-chart.deploymentSelectorLabels" $labelCtx | nindent 6 }}
  {{- if $np.policyTypes }}
  policyTypes:
    {{- toYaml $np.policyTypes | nindent 4 }}
  {{- else if or $np.ingress $np.egress }}
  policyTypes:
    {{- if $np.ingress }}
    - Ingress
    {{- end }}
    {{- if $np.egress }}
    - Egress
    {{- end }}
  {{- else }}
  {{- fail (printf "NetworkPolicy for deployment '%s': at least one of policyTypes, ingress, or egress must be set when networkPolicy.enabled is true." $name) }}
  {{- end }}
  {{- with $np.ingress }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $np.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
