{{/*
  Hooks can be defined in two places:
  1. Root level: .Values.hooks (standalone, optional fromDeployment for image)
  2. Inside deployments: .Values.deployments.<name>.hooks (inherits image, configMap, secret, SA from deployment)
*/}}

{{- $root := . }}

{{/* ====== PART 1: Root-level hooks ====== */}}
{{- if .Values.hooks }}
{{- range $hookType, $jobs := .Values.hooks }}
{{- range $name, $command := $jobs }}
{{- if $command }}
{{- $hookFullname := include "global-chart.hookfullname" (merge (dict "hookname" $hookType "jobname" $name) $root) }}

{{- /* Resolve image: explicit > fromDeployment > error */ -}}
{{- $cmdImage := "" }}
{{- if hasKey $command "image" }}
  {{- $cmdImage = include "global-chart.imageString" (dict "image" $command.image "global" $root.Values.global) -}}
{{- else if $command.fromDeployment }}
  {{- $depName := $command.fromDeployment -}}
  {{- $deploy := index $root.Values.deployments $depName -}}
  {{- if not $deploy -}}
    {{- fail (printf "hooks.%s.%s.fromDeployment references deployment '%s' which does not exist in .Values.deployments" $hookType $name $depName) -}}
  {{- end -}}
  {{- $cmdImage = include "global-chart.imageString" (dict "image" $deploy.image "global" $root.Values.global) -}}
{{- end }}
{{- $imageRef := required (printf "image is required for hooks.%s.%s (set hooks.%s.%s.image or hooks.%s.%s.fromDeployment)" $hookType $name $hookType $name $hookType $name) $cmdImage }}

{{- /* ServiceAccount handling */ -}}
{{- $commandSAMap := (and (hasKey $command "serviceAccount") (kindIs "map" $command.serviceAccount)) | ternary $command.serviceAccount (dict) -}}
{{- $commandSAExplicitName := coalesce $command.serviceAccountName $commandSAMap.name -}}
{{- $saName := $hookFullname -}}
{{- if $commandSAExplicitName -}}
  {{- $saName = $commandSAExplicitName -}}
{{- end -}}
{{- $saCreate := false -}}
{{- if hasKey $commandSAMap "create" -}}
  {{- $saCreate = $commandSAMap.create -}}
{{- end -}}
{{- $saAutomount := true -}}
{{- if hasKey $command "automountServiceAccountToken" -}}
  {{- $saAutomount = $command.automountServiceAccountToken -}}
{{- end -}}
{{- if hasKey $commandSAMap "automountServiceAccountToken" -}}
  {{- $saAutomount = $commandSAMap.automountServiceAccountToken -}}
{{- end -}}
{{- if hasKey $commandSAMap "automount" -}}
  {{- $saAutomount = $commandSAMap.automount -}}
{{- end -}}
{{- $saAnnotations := $command.serviceAccountAnnotations -}}
{{- if hasKey $commandSAMap "annotations" -}}
  {{- $saAnnotations = $commandSAMap.annotations -}}
{{- end -}}

{{- /* ServiceAccount uses weight 5 so it exists before the Job (weight 10) */ -}}
{{- if or $saCreate (not $commandSAExplicitName) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $saName }}
  namespace: {{ $root.Release.Namespace | quote }}
  labels:
    {{- include "global-chart.hookLabelsWithComponent" $root | nindent 4 }}
  annotations:
    {{- with (include "global-chart.renderCommonAnnotations" $root) }}
    {{- . | nindent 4 }}
    {{- end }}
    {{- $effectiveJobWeight := int (ternary $command.weight 10 (hasKey $command "weight")) }}
    {{- $saWeight := sub $effectiveJobWeight 5 }}
    {{- if lt $saWeight 0 }}{{ $saWeight = 0 }}{{ end }}
    "helm.sh/hook": {{ $hookType | quote }}
    "helm.sh/hook-weight": {{ $saWeight | quote }}
    "helm.sh/hook-delete-policy": {{ ternary $command.deletePolicy "before-hook-creation" (hasKey $command "deletePolicy") | quote }}
    {{- with $saAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
automountServiceAccountToken: {{ $saAutomount }}
{{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $hookFullname }}
  labels:
    {{- include "global-chart.hookLabelsWithComponent" $root | nindent 4 }}
  annotations:
    {{- with (include "global-chart.renderCommonAnnotations" $root) }}
    {{- . | nindent 4 }}
    {{- end }}
    "helm.sh/hook": {{ $hookType | quote }}
    "helm.sh/hook-weight": {{ ternary $command.weight "10" (hasKey $command "weight") | quote }}
    "helm.sh/hook-delete-policy": {{ ternary $command.deletePolicy "before-hook-creation" (hasKey $command "deletePolicy") | quote }}
spec:
  template:
    metadata:
      name: {{ $hookFullname }}
      labels:
        {{- include "global-chart.hookLabelsWithComponent" $root | nindent 8 }}
      {{- with (include "global-chart.renderCommonAnnotations" $root) }}
      annotations:
        {{- . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ $saName | quote }}
      {{- /* ImagePullSecrets: hook-level > global (hasKey distinguishes unset from empty) */ -}}
      {{- $hookImagePullSecrets := list -}}
      {{- if hasKey $command "imagePullSecrets" -}}
        {{- $hookImagePullSecrets = $command.imagePullSecrets -}}
      {{- else -}}
        {{- $global := default (dict) $root.Values.global -}}
        {{- $hookImagePullSecrets = $global.imagePullSecrets -}}
      {{- end -}}
      {{- with (include "global-chart.renderImagePullSecrets" $hookImagePullSecrets) }}
{{- . | nindent 6 }}
      {{- end }}
      {{- with $command.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $command.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (include "global-chart.renderDnsConfig" $command.dnsConfig) }}
{{- . | nindent 6 }}
      {{- end }}
      restartPolicy: {{ default "Never" (ternary $command.restartPolicy "" (hasKey $command "restartPolicy")) | quote }}
      containers:
      - name: {{ $hookFullname }}
        image: {{ $imageRef | quote }}
        imagePullPolicy: {{ include "global-chart.imagePullPolicy" (dict "override" $command.imagePullPolicy "image" $command.image) | quote }}
        {{- if $command.command }}
        command:
          {{- toYaml $command.command | nindent 10 }}
        {{- end }}
        {{- if $command.args }}
        args:
          {{- toYaml $command.args | nindent 10 }}
        {{- end }}
        {{- with $command.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with (include "global-chart.renderResources" (dict "resources" $command.resources "hasResources" (hasKey $command "resources") "defaults" $root.Values.defaults)) }}
{{- . | nindent 8 }}
        {{- end }}
        {{- if or $command.envFromConfigMaps $command.envFromSecrets }}
        envFrom:
          {{- range $cm := $command.envFromConfigMaps }}
          - configMapRef:
              name: {{ $cm | quote }}
          {{- end }}
          {{- range $sec := $command.envFromSecrets }}
          - secretRef:
              name: {{ $sec | quote }}
          {{- end }}
        {{- end }}
        {{- if $command.env }}
        env:
          {{- toYaml $command.env | nindent 10 }}
        {{- end }}
        {{- with $command.volumeMounts }}
        volumeMounts:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- with $command.volumes }}
      volumes:
        {{- range . }}
        {{- include "global-chart.renderVolume" . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with $command.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $command.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $command.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

{{/* ====== PART 2: Deployment-level hooks (inherit from deployment) ====== */}}
{{- range $deployName, $deploy := .Values.deployments }}
{{- if $deploy }}
{{- if and (eq (include "global-chart.deploymentEnabled" (dict "deploy" $deploy)) "true") $deploy.hooks }}

{{- /* Compute deployment-level values ONCE per deployment (before hookType/command loops) */ -}}
{{- $deployFullname := include "global-chart.deploymentFullname" (dict "root" $root "deploymentName" $deployName) -}}
{{- $hasDeployConfigMap := and $deploy.configMap (gt (len $deploy.configMap) 0) -}}
{{- $hasDeploySecret := and $deploy.secret (gt (len $deploy.secret) 0) -}}
{{- /* Aggregate ALL hook types for prerequisite resources (sorted for deterministic output) */ -}}
{{- $allHookTypes := keys $deploy.hooks | sortAlpha | join "," -}}

{{- /*
  Hook-specific ConfigMap/Secret: duplicates of the deployment's generated ConfigMap/Secret
  with hook annotations so they exist BEFORE the Job runs.
  Normal (non-hook) ConfigMap/Secret are NOT updated until after hooks complete,
  so the Job would reference stale values without these hook copies.
  Rendered ONCE per deployment (not per hook command) with ALL hook types aggregated.
*/ -}}
{{- if $hasDeployConfigMap }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-hook-config" $deployFullname | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "global-chart.hookLabels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $deployName }}-hook
  annotations:
    {{- with (include "global-chart.renderCommonAnnotations" $root) }}
    {{- . | nindent 4 }}
    {{- end }}
    "helm.sh/hook": {{ $allHookTypes | quote }}
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": "before-hook-creation"
data:
{{- range $key, $value := $deploy.configMap }}
  {{- if or (kindIs "map" $value) (kindIs "slice" $value) }}
  {{ $key }}:
    {{- toYaml $value | nindent 4 }}
  {{- else }}
  {{ $key }}: {{ toString $value | quote }}
  {{- end }}
{{- end }}
{{- end }}
{{- if $hasDeploySecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-hook-secret" $deployFullname | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "global-chart.hookLabels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $deployName }}-hook
  annotations:
    {{- with (include "global-chart.renderCommonAnnotations" $root) }}
    {{- . | nindent 4 }}
    {{- end }}
    "helm.sh/hook": {{ $allHookTypes | quote }}
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": "before-hook-creation"
type: Opaque
data:
{{- range $key, $value := $deploy.secret }}
  {{- if kindIs "string" $value }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- else }}
  {{ $key }}: {{ toYaml $value | b64enc | quote }}
  {{- end }}
{{- end }}
{{- end }}

{{- /* Per hook type and command: SA + Job */ -}}
{{- range $hookType, $jobs := $deploy.hooks }}
{{- range $name, $command := $jobs }}
{{- if $command }}

{{- /* Build hook fullname with deployment name for uniqueness */ -}}
{{- $hookFullname := printf "%s-%s-%s-%s" (include "global-chart.fullname" $root) $deployName $hookType $name | trunc 63 | trimSuffix "-" }}

{{- /* Resolve image: explicit in hook > inherited from deployment */ -}}
{{- $cmdImage := "" }}
{{- if hasKey $command "image" }}
  {{- $cmdImage = include "global-chart.imageString" (dict "image" $command.image "global" $root.Values.global) -}}
{{- else }}
  {{- $cmdImage = include "global-chart.imageString" (dict "image" $deploy.image "global" $root.Values.global) -}}
{{- end }}
{{- $imageRef := required (printf "image is required for deployments.%s.hooks.%s.%s" $deployName $hookType $name) $cmdImage }}

{{- /* ServiceAccount: explicit in hook > inherited from deployment > create new for hook */ -}}
{{- $deploySA := default (dict) $deploy.serviceAccount -}}
{{- $commandSAMap := (and (hasKey $command "serviceAccount") (kindIs "map" $command.serviceAccount)) | ternary $command.serviceAccount (dict) -}}
{{- $commandSAExplicitName := coalesce $command.serviceAccountName $commandSAMap.name -}}

{{- /*
  Resolve deployment's SA name:
  - If deployment has serviceAccount.create=true, use generated or specified name
  - If deployment has serviceAccount.name but create=false, use that existing name
  - Otherwise no deployment SA to inherit
*/ -}}
{{- $deploymentSAName := "" -}}
{{- $deploySACreate := ternary $deploySA.create true (hasKey $deploySA "create") -}}
{{- if $deploySACreate -}}
  {{- $deploymentSAName = include "global-chart.deploymentServiceAccountName" (dict "root" $root "deploymentName" $deployName "deployment" $deploy) -}}
{{- else if $deploySA.name -}}
  {{- /* Deployment references an existing SA - inherit it */ -}}
  {{- $deploymentSAName = $deploySA.name -}}
{{- end -}}

{{- $saName := "" -}}
{{- $saCreate := false -}}
{{- if $commandSAExplicitName -}}
  {{- /* Hook explicitly specifies a SA name - use it */ -}}
  {{- $saName = $commandSAExplicitName -}}
{{- else if $deploymentSAName -}}
  {{- /* Inherit from deployment's service account (whether created or existing) */ -}}
  {{- $saName = $deploymentSAName -}}
{{- else -}}
  {{- /* No SA from hook or deployment - create hook-specific SA */ -}}
  {{- $saName = $hookFullname -}}
  {{- $saCreate = true -}}
{{- end -}}

{{- /* Override saCreate if explicitly set in command */ -}}
{{- if hasKey $commandSAMap "create" -}}
  {{- $saCreate = $commandSAMap.create -}}
  {{- if $saCreate -}}
    {{- $saName = ternary $commandSAMap.name $hookFullname (hasKey $commandSAMap "name") -}}
  {{- end -}}
{{- end -}}

{{- $saAutomount := true -}}
{{- if hasKey $command "automountServiceAccountToken" -}}
  {{- $saAutomount = $command.automountServiceAccountToken -}}
{{- end -}}
{{- if hasKey $commandSAMap "automountServiceAccountToken" -}}
  {{- $saAutomount = $commandSAMap.automountServiceAccountToken -}}
{{- end -}}
{{- if hasKey $commandSAMap "automount" -}}
  {{- $saAutomount = $commandSAMap.automount -}}
{{- end -}}
{{- $saAnnotations := $command.serviceAccountAnnotations -}}
{{- if hasKey $commandSAMap "annotations" -}}
  {{- $saAnnotations = $commandSAMap.annotations -}}
{{- end -}}

{{- /* Create SA only if needed (not using deployment's or explicit existing);
       ServiceAccount uses weight 5 so it exists before the Job (weight 10) */ -}}
{{- if $saCreate }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $saName }}
  namespace: {{ $root.Release.Namespace | quote }}
  labels:
    {{- include "global-chart.hookLabels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $deployName }}-hook
  annotations:
    {{- $effectiveJobWeight := int (ternary $command.weight 10 (hasKey $command "weight")) }}
    {{- $saWeight := sub $effectiveJobWeight 5 }}
    {{- if lt $saWeight 0 }}{{ $saWeight = 0 }}{{ end }}
    {{- with (include "global-chart.renderCommonAnnotations" $root) }}
    {{- . | nindent 4 }}
    {{- end }}
    "helm.sh/hook": {{ $hookType | quote }}
    "helm.sh/hook-weight": {{ $saWeight | quote }}
    "helm.sh/hook-delete-policy": {{ ternary $command.deletePolicy "before-hook-creation" (hasKey $command "deletePolicy") | quote }}
    {{- with $saAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
automountServiceAccountToken: {{ $saAutomount }}
{{ end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $hookFullname }}
  labels:
    {{- include "global-chart.hookLabels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $deployName }}-hook
  annotations:
    {{- with (include "global-chart.renderCommonAnnotations" $root) }}
    {{- . | nindent 4 }}
    {{- end }}
    "helm.sh/hook": {{ $hookType | quote }}
    "helm.sh/hook-weight": {{ ternary $command.weight "10" (hasKey $command "weight") | quote }}
    "helm.sh/hook-delete-policy": {{ ternary $command.deletePolicy "before-hook-creation" (hasKey $command "deletePolicy") | quote }}
spec:
  template:
    metadata:
      name: {{ $hookFullname }}
      labels:
        {{- include "global-chart.hookLabels" $root | nindent 8 }}
        app.kubernetes.io/component: {{ $deployName }}-hook
      {{- with (include "global-chart.renderCommonAnnotations" $root) }}
      annotations:
        {{- . | nindent 8 }}
      {{- end }}
    spec:
      {{- $configMapRef := printf "%s-hook-config" $deployFullname | trunc 63 | trimSuffix "-" }}
      {{- $secretRef := printf "%s-hook-secret" $deployFullname | trunc 63 | trimSuffix "-" }}
      {{- $ctx := dict "root" $root "job" $command "deploy" $deploy "saName" $saName "imageRef" $imageRef "containerName" $name "configMapRef" $configMapRef "secretRef" $secretRef "inheritDnsConfig" false "renderInitContainers" false }}
      {{- include "global-chart.inheritedJobPodSpec" $ctx | trimPrefix "\n" | nindent 6 }}
{{ end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
