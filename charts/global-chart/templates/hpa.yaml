{{- $root := . }}
{{- range $name, $deploy := .Values.deployments }}
{{- if $deploy }}
{{- if eq (include "global-chart.deploymentEnabled" (dict "deploy" $deploy)) "true" }}
{{- $hpa := default (dict) $deploy.autoscaling }}
{{- $cpu := int (ternary $hpa.targetCPUUtilizationPercentage 0 (hasKey $hpa "targetCPUUtilizationPercentage")) }}
{{- $mem := int (ternary $hpa.targetMemoryUtilizationPercentage 0 (hasKey $hpa "targetMemoryUtilizationPercentage")) }}
{{- $hasMetric := or (gt $cpu 0) (gt $mem 0) }}
{{- if and $hpa.enabled $hasMetric }}
{{- $depFullname := include "global-chart.deploymentFullname" (dict "root" $root "deploymentName" $name) }}
{{- $labelCtx := dict "root" $root "deploymentName" $name }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $depFullname }}
  labels:
    {{- include "global-chart.deploymentLabels" $labelCtx | nindent 4 }}
  {{- with (include "global-chart.renderCommonAnnotations" $root) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $depFullname }}
  {{- if not (hasKey $hpa "minReplicas") }}
  {{- fail (printf "deployments.%s.autoscaling.minReplicas is required when HPA is enabled" $name) }}
  {{- end }}
  minReplicas: {{ $hpa.minReplicas }}
  {{- if not (hasKey $hpa "maxReplicas") }}
  {{- fail (printf "deployments.%s.autoscaling.maxReplicas is required when HPA is enabled" $name) }}
  {{- end }}
  maxReplicas: {{ $hpa.maxReplicas }}
  metrics:
    {{- if gt $cpu 0 }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $cpu }}
    {{- end }}
    {{- if gt $mem 0 }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $mem }}
    {{- end }}
  {{- with $hpa.behavior }}
  behavior:
    {{- with .scaleUp }}
    scaleUp:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .scaleDown }}
    scaleDown:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
