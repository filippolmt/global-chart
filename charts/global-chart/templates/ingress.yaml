{{- if .Values.ingress.enabled }}
{{- $root := . }}
{{- $ing := $root.Values.ingress }}
{{- $fullName := include "global-chart.fullname" $root }}
{{- $annotations := deepCopy (default (dict) $ing.annotations) }}
{{- $global := default (dict) $root.Values.global }}
{{- $commonAnnotations := default (dict) $global.commonAnnotations }}
{{- $mergedAnnotations := merge $annotations $commonAnnotations }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "global-chart.labels" $root | nindent 4 }}
  {{- with $mergedAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if $ing.className }}
  ingressClassName: {{ $ing.className | quote }}
  {{- end }}

  {{- if $ing.tls }}
  tls:
    {{- range $ing.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- range $hostEntry := $ing.hosts }}
      {{- /* Resolve service name and port via shared helper */ -}}
      {{- $b := include "global-chart.resolveBackend" (dict "root" $root "ref" $hostEntry "sourceKind" "ingress host" "sourceKindCapital" "Ingress host" "ruleNoun" "ingress rule") | fromJson -}}
      {{- $svcName := $b.name -}}
      {{- $svcPort := $b.port }}

    - host: {{ $hostEntry.host | quote }}
      http:
        paths:
          {{- range $path := $hostEntry.paths }}
          - path: {{ $path.path }}
            pathType: {{ ternary $path.pathType "ImplementationSpecific" (hasKey $path "pathType") }}
            backend:
              service:
                name: {{ $svcName }}
                port:
                  number: {{ $svcPort }}
          {{- end }}
    {{- end }}
{{- end }}
