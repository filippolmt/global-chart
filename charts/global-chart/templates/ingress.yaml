{{- if .Values.ingress.enabled }}
{{- $root := . }}
{{- $ing := $root.Values.ingress }}
{{- $fullName := include "global-chart.fullname" $root }}
{{- $annotations := deepCopy (default (dict) $ing.annotations) }}
{{- $global := default (dict) $root.Values.global }}
{{- $commonAnnotations := default (dict) $global.commonAnnotations }}
{{- $mergedAnnotations := merge $annotations $commonAnnotations }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "global-chart.labels" $root | nindent 4 }}
  {{- with $mergedAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if $ing.className }}
  ingressClassName: {{ $ing.className | quote }}
  {{- end }}

  {{- if $ing.tls }}
  tls:
    {{- range $ing.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- range $hostEntry := $ing.hosts }}
      {{- /* Resolve service name and port */ -}}
      {{- $svcName := "" -}}
      {{- $svcPort := 80 -}}

      {{- /* Priority 1: Explicit service override */ -}}
      {{- if and (hasKey $hostEntry "service") $hostEntry.service $hostEntry.service.name -}}
        {{- $svcName = $hostEntry.service.name -}}
        {{- $svcPort = ternary $hostEntry.service.port 80 (hasKey $hostEntry.service "port") -}}
      {{- /* Priority 2: Deployment reference */ -}}
      {{- else if $hostEntry.deployment -}}
        {{- $depName := $hostEntry.deployment -}}
        {{- $deploy := index $root.Values.deployments $depName -}}
        {{- if not $deploy -}}
          {{- fail (printf "ingress host '%s' references deployment '%s' which does not exist in .Values.deployments" $hostEntry.host $depName) -}}
        {{- end -}}
        {{- if ne (include "global-chart.deploymentEnabled" (dict "deploy" $deploy)) "true" -}}
          {{- fail (printf "ingress host '%s' references deployment '%s' which has enabled: false (its Service will not be created)" $hostEntry.host $depName) -}}
        {{- end -}}
        {{- $depSvc := default (dict) $deploy.service -}}
        {{- if and (hasKey $depSvc "enabled") (not $depSvc.enabled) -}}
          {{- fail (printf "Ingress host '%s' references deployment '%s' which has service.enabled: false. Enable the service or remove the ingress rule." $hostEntry.host $depName) -}}
        {{- end -}}
        {{- $svcName = include "global-chart.deploymentFullname" (dict "root" $root "deploymentName" $depName) -}}
        {{- $svcPort = ternary $depSvc.port 80 (hasKey $depSvc "port") -}}
      {{- /* Priority 3: Error - must specify deployment or service */ -}}
      {{- else -}}
        {{- fail (printf "ingress host '%s' must specify either 'deployment' (name of a deployment) or 'service.name' (explicit service name)" $hostEntry.host) -}}
      {{- end }}

    - host: {{ $hostEntry.host | quote }}
      http:
        paths:
          {{- range $path := $hostEntry.paths }}
          - path: {{ $path.path }}
            pathType: {{ ternary $path.pathType "ImplementationSpecific" (hasKey $path "pathType") }}
            backend:
              service:
                name: {{ $svcName }}
                port:
                  number: {{ $svcPort }}
          {{- end }}
    {{- end }}
{{- end }}
