# Default values for global-chart.

# -- Global values shared across all deployments, cronJobs, and hooks
global:
  # -- Global image registry prefix (e.g., registry.example.com)
  # @default -- `""` (no prefix)
  imageRegistry: ""
  # -- Global imagePullSecrets (used when deployment/cronJob/hook doesn't specify its own)
  # @default -- `[]`
  imagePullSecrets: []
  # -- Global labels applied to metadata.labels of ALL resources (not added to selector labels)
  # @default -- `{}`
  commonLabels: {}
  # -- Global annotations applied to metadata.annotations of ALL resources (including pod templates)
  # @default -- `{}`
  commonAnnotations: {}

# -- Override the chart name
nameOverride: ""
# -- Override the chart fullname
fullnameOverride: ""

# -- Multiple deployments configuration (map of named deployments). Each deployment supports an `enabled` field (bool, default `true`) to skip rendering of the Deployment and all its sub-resources (Service, ConfigMap, Secret, ServiceAccount, HPA, mounted ConfigMaps, CronJobs, Hooks). An Ingress that references a disabled deployment will fail with a clear error.
# @default -- `{}` (empty map)
deployments: {}
  # Example deployment configuration:
  # main:
  #   # -- (bool) Enable or disable this deployment and all its sub-resources (Service, ConfigMap, Secret, SA, HPA). Default: true
  #   enabled: true
  #
  #   # -- (int) Number of replicas to deploy
  #   replicaCount: 2
  #
  #   # -- Image configuration (can be string like "nginx:1.23" or object)
  #   image:
  #     # -- Image repository (e.g., nginx)
  #     repository: nginx
  #     # -- Image pull policy: Always, IfNotPresent, or Never
  #     pullPolicy: IfNotPresent
  #     # -- Image tag (e.g., "1.23.3")
  #     tag: "1.23"
  #
  #   # -- List of imagePullSecrets for private registries
  #   imagePullSecrets: []
  #
  #   # -- ServiceAccount creation and mounting (created by default)
  #   serviceAccount:
  #     # -- Create a ServiceAccount (default: true)
  #     create: true
  #     # -- Automount the ServiceAccount credentials
  #     automount: true
  #     # -- Annotations to add to the ServiceAccount
  #     annotations: {}
  #     # -- Use an existing ServiceAccount name
  #     name: ""
  #
  #   # -- Pod annotations
  #   podAnnotations: {}
  #   # -- Pod labels
  #   podLabels: {}
  #
  #   # -- Pod-level security context (e.g., fsGroup)
  #   podSecurityContext: {}
  #
  #   # -- Container-level security context (e.g., runAsUser)
  #   securityContext: {}
  #
  #   # -- Service that front-ends the Deployment
  #   service:
  #     # -- Enable or disable the Service (default: true)
  #     enabled: true
  #     # -- Service port name
  #     portName: http
  #     # -- Service type: ClusterIP, NodePort, or LoadBalancer
  #     type: ClusterIP
  #     # -- Port exposed by the Service
  #     port: 80
  #     # -- Target port on the pod
  #     targetPort: http
  #     # -- Protocol for the service port (TCP|UDP)
  #     protocol: TCP
  #     # -- Additional ports exposed by the same Service (multi-port workloads)
  #     # Each entry requires: name, port, targetPort. Optional: protocol, appProtocol, nodePort.
  #     extraPorts: []
  #     # extraPorts:
  #     #   - name: gevent
  #     #     port: 8072
  #     #     targetPort: 8072
  #     #     appProtocol: http
  #
  #   # -- Resource requests & limits for pods
  #   resources:
  #     requests:
  #       memory: "64Mi"
  #       cpu: "100m"
  #
  #   # -- Liveness probe configuration
  #   livenessProbe: {}
  #
  #   # -- Readiness probe configuration
  #   readinessProbe: {}
  #
  #   # -- Startup probe configuration
  #   startupProbe: {}
  #
  #   # -- Container lifecycle hooks (preStop / postStart). Useful for graceful shutdown.
  #   lifecycle: {}
  #     # preStop:
  #     #   exec:
  #     #     command: ["/bin/sh", "-c", "sleep 5"]
  #
  #   # -- Pod termination grace period in seconds (Kubernetes default: 30)
  #   terminationGracePeriodSeconds: 30
  #
  #   # -- Horizontal Pod Autoscaling configuration
  #   autoscaling:
  #     enabled: false
  #     minReplicas: 2
  #     maxReplicas: 10
  #     targetCPUUtilizationPercentage: ""
  #     targetMemoryUtilizationPercentage: ""
  #     behavior:
  #       scaleUp: {}
  #       scaleDown: {}
  #
  #   # -- Deployment rollout strategy
  #   strategy:
  #     type: RollingUpdate
  #     rollingUpdate:
  #       maxSurge: 1
  #       maxUnavailable: 0
  #
  #   # -- Number of old ReplicaSets to retain (default: Kubernetes default of 10)
  #   revisionHistoryLimit: 10
  #
  #   # -- Max time in seconds for deployment to make progress before considered failed
  #   progressDeadlineSeconds: 600
  #
  #   # -- Pod topology spread constraints for even pod distribution
  #   topologySpreadConstraints: []
  #     # - maxSkew: 1
  #     #   topologyKey: topology.kubernetes.io/zone
  #     #   whenUnsatisfiable: DoNotSchedule
  #     #   labelSelector:
  #     #     matchLabels:
  #     #       app: web
  #
  #   # -- PodDisruptionBudget configuration
  #   pdb:
  #     # -- Enable PDB for this deployment
  #     enabled: false
  #     # -- Minimum available pods (integer or percentage)
  #     minAvailable: 1
  #     # -- Maximum unavailable pods (alternative to minAvailable)
  #     # maxUnavailable: 1
  #
  #   # -- NetworkPolicy configuration
  #   networkPolicy:
  #     # -- Enable NetworkPolicy for this deployment
  #     enabled: false
  #     # -- Policy types to enforce (Ingress, Egress, or both)
  #     policyTypes:
  #       - Ingress
  #     # -- Ingress rules (from which sources traffic is allowed)
  #     ingress: []
  #       # - from:
  #       #     - namespaceSelector:
  #       #         matchLabels:
  #       #           name: frontend
  #       #   ports:
  #       #     - port: 80
  #       #       protocol: TCP
  #     # -- Egress rules (to which destinations traffic is allowed)
  #     egress: []
  #
  #   # -- Pod volumes (native K8s spec or legacy .type format)
  #   volumes: []
  #     # Native format (recommended):
  #     # - name: data
  #     #   emptyDir: {}
  #     # - name: certs
  #     #   csi:
  #     #     driver: secrets-store.csi.k8s.io
  #     # Legacy format (backward compatible):
  #     # - name: myvolume
  #     #   type: secret
  #     #   secret:
  #     #     secretName: my-secret
  #
  #   # -- Container volumeMounts for the above volumes
  #   volumeMounts: []
  #
  #   # -- Node selector constraints for pod placement
  #   nodeSelector: {}
  #
  #   # -- Pod tolerations
  #   tolerations: []
  #
  #   # -- Pod affinity/anti-affinity rules
  #   affinity: {}
  #
  #   # -- Secret key/value for envFrom injection (creates a Secret)
  #   secret: {}
  #
  #   # -- ConfigMap key/value for envFrom injection (creates a ConfigMap)
  #   configMap: {}
  #
  #   # -- hostAliases entries for pods
  #   hostAliases: []
  #
  #   # -- DNS settings for pods
  #   dnsConfig:
  #     nameservers: []
  #     searches: []
  #     options: []
  #
  #   # -- Import existing ConfigMaps as envFrom
  #   envFromConfigMaps: []
  #   # -- Import existing Secrets as envFrom
  #   envFromSecrets: []
  #   # -- Additional environment variables
  #   additionalEnvs: []
  #
  #   # -- Extra initContainers
  #   extraInitContainers: []
  #   # -- Extra sidecar containers
  #   extraContainers: []
  #
  #   # -- Recreate pods on config change (with pullPolicy=Always)
  #   podRecreation:
  #     enabled: false
  #
  #   # -- Dynamic ConfigMaps to create from inline content or file bundles
  #   mountedConfigFiles:
  #     files: []
  #     bundles: []
  #
  #   # -- Hooks defined inside deployment (inherit image, configMap, secret, SA)
  #   hooks:
  #     post-upgrade:
  #       migrate:
  #         command: ["./migrate.sh"]
  #         # Inherits: image, configMap, secret, serviceAccount, nodeSelector, tolerations, affinity
  #         # Can override with explicit values if needed
  #
  #   # -- CronJobs defined inside deployment (inherit image, configMap, secret, SA)
  #   cronJobs:
  #     backup:
  #       schedule: "0 2 * * *"
  #       command: ["./backup.sh"]
  #       # Inherits: image, configMap, secret, serviceAccount, nodeSelector, tolerations, affinity
  #       # Can override with explicit values if needed
  #       # Hardening (all optional):
  #       # timeZone: "Europe/Rome"          # CronJob spec, k8s >=1.27
  #       # suspend: false                   # pause without removing
  #       # startingDeadlineSeconds: 60      # bound catch-up on missed schedules
  #       # backoffLimit: 3                  # k8s default 6
  #       # ttlSecondsAfterFinished: 600     # GC finished Jobs (avoids etcd bloat)
  #       # activeDeadlineSeconds: 900       # kill runaway Jobs
  #       # parallelism: 1
  #       # completions: 1
  #       # Opt-out of deployment ConfigMap/Secret env injection (defaults: true):
  #       # inheritDeploymentConfigMap: false
  #       # inheritDeploymentSecret: false

# -- Ingress configuration
ingress:
  # -- Enable or disable Ingress
  enabled: false
  # -- IngressClass to use (e.g., nginx)
  className: "nginx"
  # -- Annotations to add to the Ingress
  annotations: {}
  # -- TLS configuration for secure hosts
  tls: []

  # -- Definitions for each host rule
  hosts:
    - host: chart-example.local
      # -- Name of the deployment to route traffic to (required unless service.name is set)
      deployment: ""
      # -- Service backend override (use instead of deployment for external services)
      service:
        # -- Explicit service name (overrides deployment reference)
        name: ""
        # -- Service port (default: deployment's service.port or 80)
        port: 0
      # -- HTTP path definitions for this host
      paths:
        - path: /
          pathType: ImplementationSpecific

    # Example with deployment reference:
    # - host: api.example.local
    #   deployment: backend  # Routes to deployments.backend's service
    #   paths:
    #     - path: /v1
    #       pathType: Prefix
    #
    # Example with external service:
    # - host: external.example.local
    #   service:
    #     name: my-external-svc
    #     port: 8080
    #   paths:
    #     - path: /
    #       pathType: Prefix

# -- HTTPRoute (Gateway API v1) — alternative to Ingress.
# The chart renders only the HTTPRoute resource; the referenced Gateway must be
# managed externally (e.g. by your platform team or a separate infra chart).
# Mutually exclusive with `ingress.enabled` — enabling both fails template render.
httpRoute:
  # -- Enable HTTPRoute rendering. Requires Gateway API v1 CRDs in the cluster.
  enabled: false

  # -- Annotations applied to the HTTPRoute resource (merged with global.commonAnnotations).
  annotations: {}

  # -- References to existing Gateway resources. At least one is required when enabled.
  # Each entry: { name, namespace?, sectionName?, port?, kind?, group? }
  parentRefs: []
  # Example:
  # parentRefs:
  #   - name: public-gw
  #     namespace: gateway-system
  #     sectionName: https

  # -- Hostnames the HTTPRoute responds to. Optional but typical for HTTP routing.
  hostnames: []

  # -- Routing rules. Each rule may declare matches, filters, backendRefs, timeouts.
  # backendRefs accept either `deployment: <name>` (resolves to the chart-managed Service)
  # or `service: { name, port }` for an external Service.
  rules: []
  # Example (canary 90/10):
  # rules:
  #   - matches:
  #       - path:
  #           type: PathPrefix
  #           value: /
  #     backendRefs:
  #       - deployment: api-stable
  #         weight: 90
  #       - deployment: api-canary
  #         weight: 10

# -- CronJobs configuration (map of named cronJobs). Can also be defined inside deployments to inherit image, configMap, secret, SA.
cronJobs: {}
  # Example:
  # cleanup:
  #   schedule: "0 2 * * *"
  #   # Image can be explicit:
  #   image:
  #     repository: myapp
  #     tag: v1.0
  #   # Or reference a deployment's image:
  #   # fromDeployment: main
  #   command: ["/bin/sh", "-c"]
  #   args: ["./cleanup.sh"]
  #   resources:
  #     requests:
  #       cpu: 100m
  #       memory: 128Mi
  #   # Optional: create dedicated ServiceAccount
  #   serviceAccount:
  #     create: true
  #   # Or use existing:
  #   # serviceAccountName: existing-sa
  #   # Hardening (all optional):
  #   # timeZone: "Europe/Rome"           # CronJob spec, k8s >=1.27
  #   # suspend: false                    # pause without removing
  #   # startingDeadlineSeconds: 60       # bound catch-up on missed schedules
  #   # backoffLimit: 3                   # k8s default 6
  #   # ttlSecondsAfterFinished: 600      # GC finished Jobs (avoids etcd bloat)
  #   # activeDeadlineSeconds: 900        # kill runaway Jobs
  #   # parallelism: 1
  #   # completions: 1
  #
  # Note: root-level cronJobs do NOT auto-inherit ConfigMap/Secret from deployments.
  # Use envFromConfigMaps / envFromSecrets to reference them by name explicitly.
  # Deployment-level cronJobs (deployments.<name>.cronJobs) DO auto-inherit; use
  # inheritDeploymentConfigMap/inheritDeploymentSecret: false to opt out.

# -- Hook jobs for chart lifecycle (install/upgrade). Can also be defined inside deployments to inherit image, configMap, secret, SA.
hooks: {}
  # Example:
  # post-install:
  #   migrate:
  #     # Image can be explicit:
  #     image:
  #       repository: myapp
  #       tag: v1.0
  #     # Or reference a deployment's image:
  #     # fromDeployment: main
  #     command: ["/bin/sh", "-c"]
  #     args: ["./migrate.sh"]
  #     weight: "10"
  #     deletePolicy: before-hook-creation

# -- ExternalSecrets definitions for secret management
externalSecrets: {}

# -- Default resource settings for CronJobs and Hooks when not specified per-job
defaults:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi

# -- RBAC configuration: create multiple service accounts, roles and rolebindings
rbacs:
  # -- Set serviceAccount.create to false to bind to an existing account without creating it.
  roles: []
    # - name: custom-role
    #   serviceAccount:
    #     name: custom-sa
    #     create: true
    #     automount: true
    #     annotations:
    #       key: value
    #   rules:
    #     - apiGroups: [""]
    #       resources: ["pods"]
    #       verbs: ["get", "list"]
