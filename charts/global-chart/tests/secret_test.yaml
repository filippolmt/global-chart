suite: secret template tests
templates:
  - templates/secret.yaml
tests:
  - it: should not render secret when not defined
    set:
      deployments:
        main:
          image: nginx:1.25
    asserts:
      - hasDocuments:
          count: 0

  - it: should render secret with string values
    set:
      deployments:
        main:
          image: nginx:1.25
          secret:
            DB_PASSWORD: mysecret
            API_KEY: mykey123
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: type
          value: Opaque
      - isNotEmpty:
          path: data.DB_PASSWORD
      - isNotEmpty:
          path: data.API_KEY

  - it: should render secret with correct name
    set:
      deployments:
        backend:
          image: nginx:1.25
          secret:
            KEY: value
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*backend.*"

  - it: should render multiple secrets for multiple deployments
    set:
      deployments:
        frontend:
          image: nginx:1.25
          secret:
            KEY1: val1
        backend:
          image: myapp:v1
          secret:
            KEY2: val2
    asserts:
      - hasDocuments:
          count: 2
