suite: cronjob template tests
templates:
  - templates/cronjob.yaml
tests:
  # ====== Root-level CronJob naming (52 char truncation) ======
  - it: should truncate root-level cronjob name to 52 chars
    release:
      name: my-very-long-release-name
    set:
      deployments:
        main:
          image: nginx:1.25
      cronJobs:
        very-long-cronjob-name-that-exceeds:
          schedule: "0 2 * * *"
          fromDeployment: main
          command: ["echo", "test"]
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 0
      - matchRegex:
          path: metadata.name
          pattern: "^.{1,52}$"

  # ====== Root-level CronJob basic ======
  - it: should render root-level cronjob with explicit image
    set:
      cronJobs:
        backup:
          schedule: "0 2 * * *"
          image: myapp/backup:v1
          command: ["./backup.sh"]
          args: ["--full"]
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: spec.schedule
          value: "0 2 * * *"
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: "myapp/backup:v1"

  # ====== Root-level CronJob with fromDeployment ======
  - it: should resolve image from fromDeployment
    set:
      deployments:
        api:
          image:
            repository: myapp/api
            tag: "v2.0"
      cronJobs:
        cleanup:
          schedule: "0 4 * * *"
          fromDeployment: api
          command: ["./cleanup.sh"]
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: "myapp/api:v2.0"

  # ====== Deployment enabled flag ======
  - it: should not render deployment-level cronjob when deployment enabled is false
    set:
      deployments:
        backend:
          enabled: false
          image: myapp:v2
          cronJobs:
            cleanup:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
    asserts:
      - hasDocuments:
          count: 0

  # ====== Deployment-level CronJob inheritance ======
  - it: should inherit image from parent deployment
    set:
      deployments:
        backend:
          image:
            repository: myapp/backend
            tag: "v1.0"
          configMap:
            DB_HOST: postgres
          secret:
            DB_PASS: secret
          serviceAccount:
            create: true
          nodeSelector:
            tier: backend
          tolerations:
            - key: "dedicated"
              operator: "Equal"
              value: "backend"
              effect: "NoSchedule"
          cronJobs:
            db-backup:
              schedule: "0 2 * * *"
              command: ["./backup.sh"]
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 0
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: "myapp/backend:v1.0"
      - equal:
          path: spec.jobTemplate.spec.template.spec.nodeSelector.tier
          value: backend

  # ====== Deployment-level CronJob SA inheritance ======
  - it: should inherit serviceAccount from parent deployment
    release:
      name: myrel
    set:
      deployments:
        backend:
          image: myapp/backend:v1
          serviceAccount:
            create: true
          cronJobs:
            cleanup:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 0
      - equal:
          path: spec.jobTemplate.spec.template.spec.serviceAccountName
          value: "myrel-global-chart-backend"

  # ====== CronJob default resources ======
  - it: should use default resources when not specified
    set:
      cronJobs:
        simple:
          schedule: "0 0 * * *"
          image: busybox:latest
          command: ["echo", "hello"]
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources.requests.memory
          value: 128Mi

  # ====== CronJob labels ======
  - it: should include component label on deployment-level cronjob
    set:
      deployments:
        worker:
          image: myapp:v1
          serviceAccount:
            create: true
            name: worker-sa
          cronJobs:
            task:
              schedule: "0 * * * *"
              command: ["./task.sh"]
              serviceAccountName: worker-sa
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 0
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/component: worker
        documentIndex: 0

  # ====== Deployment-level CronJob hostAliases inheritance ======
  - it: should inherit hostAliases from deployment in deployment-level cronjob
    set:
      deployments:
        backend:
          image: myapp:v1
          hostAliases:
            - ip: "127.0.0.1"
              hostnames:
                - "foo.local"
                - "bar.local"
          cronJobs:
            cleanup:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 1
      - equal:
          path: spec.jobTemplate.spec.template.spec.hostAliases[0].ip
          value: "127.0.0.1"
        documentIndex: 1
      - equal:
          path: spec.jobTemplate.spec.template.spec.hostAliases[0].hostnames[0]
          value: "foo.local"
        documentIndex: 1

  - it: should allow cronjob to override inherited hostAliases
    set:
      deployments:
        backend:
          image: myapp:v1
          hostAliases:
            - ip: "127.0.0.1"
              hostnames:
                - "foo.local"
          cronJobs:
            cleanup:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
              hostAliases:
                - ip: "10.0.0.1"
                  hostnames:
                    - "custom.local"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.hostAliases[0].ip
          value: "10.0.0.1"
        documentIndex: 1

  # ====== Deployment-level CronJob: explicit empty should NOT inherit ======
  - it: should not inherit hostAliases when cronjob sets empty list
    set:
      deployments:
        backend:
          image: myapp:v1
          hostAliases:
            - ip: "127.0.0.1"
              hostnames:
                - "foo.local"
          cronJobs:
            cleanup:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
              hostAliases: []
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 1
      - isNull:
          path: spec.jobTemplate.spec.template.spec.hostAliases
        documentIndex: 1

  - it: should not inherit podSecurityContext when cronjob sets empty map
    set:
      deployments:
        backend:
          image: myapp:v1
          podSecurityContext:
            runAsUser: 1000
          cronJobs:
            cleanup:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
              podSecurityContext: {}
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 1
      - isNull:
          path: spec.jobTemplate.spec.template.spec.securityContext
        documentIndex: 1

  - it: should not inherit container securityContext when cronjob sets empty map
    set:
      deployments:
        backend:
          image: myapp:v1
          securityContext:
            runAsNonRoot: true
          cronJobs:
            cleanup:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
              securityContext: {}
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 1
      - isNull:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext
        documentIndex: 1

  # ====== Deployment-level CronJob: explicit empty should NOT inherit (nodeSelector, affinity, tolerations, imagePullSecrets) ======
  - it: should allow cronjob to override nodeSelector with empty map
    set:
      deployments:
        backend:
          image: "myapp:v1"
          nodeSelector:
            disktype: ssd
          cronJobs:
            cleanup:
              schedule: "0 2 * * *"
              command: ["./cleanup.sh"]
              nodeSelector: {}
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 1
      - isNull:
          path: spec.jobTemplate.spec.template.spec.nodeSelector
        documentIndex: 1

  - it: should allow cronjob to override tolerations with empty list
    set:
      deployments:
        backend:
          image: "myapp:v1"
          tolerations:
            - key: "dedicated"
              operator: "Equal"
              value: "backend"
              effect: "NoSchedule"
          cronJobs:
            cleanup:
              schedule: "0 2 * * *"
              command: ["./cleanup.sh"]
              tolerations: []
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 1
      - isNull:
          path: spec.jobTemplate.spec.template.spec.tolerations
        documentIndex: 1

  - it: should allow cronjob to override affinity with empty map
    set:
      deployments:
        backend:
          image: "myapp:v1"
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: zone
                        operator: In
                        values: ["us-east-1a"]
          cronJobs:
            cleanup:
              schedule: "0 2 * * *"
              command: ["./cleanup.sh"]
              affinity: {}
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 1
      - isNull:
          path: spec.jobTemplate.spec.template.spec.affinity
        documentIndex: 1

  - it: should allow cronjob to override imagePullSecrets with empty list
    set:
      deployments:
        backend:
          image: "myapp:v1"
          imagePullSecrets:
            - name: regcred
          cronJobs:
            cleanup:
              schedule: "0 2 * * *"
              command: ["./cleanup.sh"]
              imagePullSecrets: []
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 1
      - isNull:
          path: spec.jobTemplate.spec.template.spec.imagePullSecrets
        documentIndex: 1

  # ====== Root-level CronJob securityContext ======
  - it: should render podSecurityContext on root-level cronjob
    set:
      deployments:
        main:
          image: nginx:1.25
      cronJobs:
        backup:
          schedule: "0 2 * * *"
          fromDeployment: main
          command: ["echo", "backup"]
          podSecurityContext:
            runAsUser: 1000
            fsGroup: 2000
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.securityContext.runAsUser
          value: 1000
        documentIndex: 0

  - it: should render container securityContext on root-level cronjob
    set:
      deployments:
        main:
          image: nginx:1.25
      cronJobs:
        backup:
          schedule: "0 2 * * *"
          fromDeployment: main
          command: ["echo", "backup"]
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
        documentIndex: 0

  # ====== Deployment-level CronJob securityContext inheritance ======
  - it: should inherit podSecurityContext from deployment in deployment-level cronjob
    set:
      deployments:
        backend:
          image: myapp:v1
          podSecurityContext:
            runAsUser: 1000
            fsGroup: 2000
          cronJobs:
            cleanup:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 1
      - equal:
          path: spec.jobTemplate.spec.template.spec.securityContext.runAsUser
          value: 1000
        documentIndex: 1

  - it: should inherit container securityContext from deployment in deployment-level cronjob
    set:
      deployments:
        backend:
          image: myapp:v1
          securityContext:
            runAsNonRoot: true
          cronJobs:
            cleanup:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
        documentIndex: 1

  # ====== Deployment-level CronJob dnsConfig inheritance ======
  - it: should inherit dnsConfig from deployment in deployment-level cronjob
    set:
      deployments:
        backend:
          image: myapp:v1
          dnsConfig:
            nameservers:
              - "8.8.8.8"
            searches:
              - "svc.cluster.local"
          cronJobs:
            cleanup:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 1
      - equal:
          path: spec.jobTemplate.spec.template.spec.dnsConfig.nameservers[0]
          value: "8.8.8.8"
        documentIndex: 1
      - equal:
          path: spec.jobTemplate.spec.template.spec.dnsConfig.searches[0]
          value: "svc.cluster.local"
        documentIndex: 1

  # ====== global imagePullSecrets ======
  - it: should use global.imagePullSecrets when cronjob has none
    set:
      global:
        imagePullSecrets:
          - name: global-regcred
      cronJobs:
        cleanup:
          schedule: "0 2 * * *"
          image: "myapp:v1"
          command: ["./cleanup.sh"]
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.imagePullSecrets[0].name
          value: "global-regcred"

  - it: should prepend global.imageRegistry to cronjob image
    set:
      global:
        imageRegistry: registry.example.com
      cronJobs:
        cleanup:
          schedule: "0 2 * * *"
          image:
            repository: myapp
            tag: "v1"
          command: ["./cleanup.sh"]
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: "registry.example.com/myapp:v1"

  # ====== falsy masking fixes ======
  - it: should render successfulJobsHistoryLimit 0 when explicitly set on root-level cronjob
    set:
      cronJobs:
        cleanup:
          schedule: "0 4 * * *"
          image: busybox:1.36
          command: ["./cleanup.sh"]
          successfulJobsHistoryLimit: 0
    asserts:
      - equal:
          path: spec.successfulJobsHistoryLimit
          value: 0

  - it: should render failedJobsHistoryLimit 0 when explicitly set on root-level cronjob
    set:
      cronJobs:
        cleanup:
          schedule: "0 4 * * *"
          image: busybox:1.36
          command: ["./cleanup.sh"]
          failedJobsHistoryLimit: 0
    asserts:
      - equal:
          path: spec.failedJobsHistoryLimit
          value: 0

  - it: should render automountServiceAccountToken false on root-level cronjob SA
    set:
      cronJobs:
        cleanup:
          schedule: "0 4 * * *"
          image: busybox:1.36
          command: ["./cleanup.sh"]
          serviceAccount:
            create: true
          automountServiceAccountToken: false
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false
        documentIndex: 0

  - it: should render successfulJobsHistoryLimit 0 on deployment-level cronjob
    set:
      deployments:
        backend:
          image: myapp:v2
          cronJobs:
            cleanup:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
              successfulJobsHistoryLimit: 0
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 1
      - equal:
          path: spec.successfulJobsHistoryLimit
          value: 0
        documentIndex: 1

  - it: should render failedJobsHistoryLimit 0 on deployment-level cronjob
    set:
      deployments:
        backend:
          image: myapp:v2
          cronJobs:
            cleanup:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
              failedJobsHistoryLimit: 0
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 1
      - equal:
          path: spec.failedJobsHistoryLimit
          value: 0
        documentIndex: 1

  - it: should still default successfulJobsHistoryLimit to 2 when not set
    set:
      cronJobs:
        cleanup:
          schedule: "0 4 * * *"
          image: busybox:1.36
          command: ["./cleanup.sh"]
    asserts:
      - equal:
          path: spec.successfulJobsHistoryLimit
          value: 2

  - it: should still default concurrencyPolicy to Forbid when not set
    set:
      cronJobs:
        cleanup:
          schedule: "0 4 * * *"
          image: busybox:1.36
          command: ["./cleanup.sh"]
    asserts:
      - equal:
          path: spec.concurrencyPolicy
          value: "Forbid"

  - it: should still default restartPolicy to Never when not set
    set:
      cronJobs:
        cleanup:
          schedule: "0 4 * * *"
          image: busybox:1.36
          command: ["./cleanup.sh"]
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.restartPolicy
          value: "Never"

  # ====== Seven-category inheritance gaps ======

  - it: should inherit affinity from deployment in deployment-level cronjob
    set:
      deployments:
        backend:
          image: myapp:v1
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: zone
                        operator: In
                        values: ["us-east-1a"]
          cronJobs:
            cleanup:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 1
      - equal:
          path: spec.jobTemplate.spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].key
          value: zone
        documentIndex: 1
      - equal:
          path: spec.jobTemplate.spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].operator
          value: In
        documentIndex: 1

  - it: should use cronJob podSecurityContext when both deployment and cronJob set it
    set:
      deployments:
        backend:
          image: myapp:v1
          podSecurityContext:
            runAsUser: 1000
          cronJobs:
            cleanup:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
              podSecurityContext:
                runAsUser: 2000
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 1
      - equal:
          path: spec.jobTemplate.spec.template.spec.securityContext.runAsUser
          value: 2000
        documentIndex: 1

  - it: should use cronJob securityContext when both deployment and cronJob set it
    set:
      deployments:
        backend:
          image: myapp:v1
          securityContext:
            runAsNonRoot: true
          cronJobs:
            cleanup:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
              securityContext:
                readOnlyRootFilesystem: true
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 1
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
        documentIndex: 1
      - isNull:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext.runAsNonRoot
        documentIndex: 1

  - it: should inherit imagePullSecrets from deployment in deployment-level cronjob
    set:
      deployments:
        backend:
          image: myapp:v1
          imagePullSecrets:
            - name: deploy-reg
          cronJobs:
            cleanup:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 1
      - equal:
          path: spec.jobTemplate.spec.template.spec.imagePullSecrets[0].name
          value: deploy-reg
        documentIndex: 1

  - it: should use cronJob imagePullSecrets when both deployment and cronJob set it
    set:
      deployments:
        backend:
          image: myapp:v1
          imagePullSecrets:
            - name: deploy-reg
          cronJobs:
            cleanup:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
              imagePullSecrets:
                - name: cron-reg
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 1
      - equal:
          path: spec.jobTemplate.spec.template.spec.imagePullSecrets[0].name
          value: cron-reg
        documentIndex: 1

  - it: should render no nodeSelector when neither deployment nor cronjob sets it
    set:
      deployments:
        backend:
          image: myapp:v1
          cronJobs:
            cleanup:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
    asserts:
      - isKind:
          of: CronJob
        documentIndex: 1
      - isNull:
          path: spec.jobTemplate.spec.template.spec.nodeSelector
        documentIndex: 1

  # ====== Negative tests: fail/required paths ======

  - it: should fail when fromDeployment references non-existent deployment
    set:
      cronJobs:
        cleanup:
          schedule: "0 * * * *"
          fromDeployment: ghost
          command: ["./run.sh"]
    asserts:
      - failedTemplate:
          errorPattern: "cronJobs.cleanup.fromDeployment references deployment 'ghost'"

  - it: should fail when root-level cronJob has no image and no fromDeployment
    set:
      cronJobs:
        cleanup:
          schedule: "0 * * * *"
          command: ["./run.sh"]
    asserts:
      - failedTemplate:
          errorPattern: "image is required for cronJobs.cleanup"

  # ====== global.commonLabels ======
  - it: should render global.commonLabels on cronjob metadata
    set:
      global:
        commonLabels:
          team: platform
      cronJobs:
        backup:
          schedule: "0 2 * * *"
          image: busybox:1.36
          command: ["echo", "backup"]
    asserts:
      - equal:
          path: metadata.labels.team
          value: platform

  # ====== Deployment-level CronJob SA inheritance (existing SA) ======
  - it: should inherit existing SA name from deployment when create=false
    set:
      deployments:
        backend:
          image: myapp:v2
          serviceAccount:
            create: false
            name: my-existing-sa
          cronJobs:
            cleanup:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
    documentIndex: 0
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: spec.jobTemplate.spec.template.spec.serviceAccountName
          value: my-existing-sa

  # ====== restartPolicy null-safe ======
  - it: should default restartPolicy to Never when not set
    set:
      cronJobs:
        backup:
          schedule: "0 2 * * *"
          image: busybox:1.36
          command: ["echo", "backup"]
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.restartPolicy
          value: Never
