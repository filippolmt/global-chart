suite: serviceaccount template tests
templates:
  - templates/serviceaccount.yaml
tests:
  # ====== Deployment enabled flag ======
  - it: should not render serviceaccount when deployment enabled is false
    set:
      deployments:
        main:
          enabled: false
          image: nginx:1.25
    asserts:
      - hasDocuments:
          count: 0

  - it: should create serviceaccount by default
    set:
      deployments:
        main:
          image: nginx:1.25
    asserts:
      - isKind:
          of: ServiceAccount
      - matchRegex:
          path: metadata.name
          pattern: ".*main.*"

  - it: should not create serviceaccount when create is false
    set:
      deployments:
        main:
          image: nginx:1.25
          serviceAccount:
            create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should set automountServiceAccountToken to true by default
    set:
      deployments:
        main:
          image: nginx:1.25
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: true

  - it: should respect automount false
    set:
      deployments:
        main:
          image: nginx:1.25
          serviceAccount:
            create: true
            automount: false
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: should render annotations when provided
    set:
      deployments:
        main:
          image: nginx:1.25
          serviceAccount:
            create: true
            annotations:
              eks.amazonaws.com/role-arn: arn:aws:iam::role/my-role
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::role/my-role"

  - it: should set namespace
    set:
      deployments:
        main:
          image: nginx:1.25
    asserts:
      - isNotEmpty:
          path: metadata.namespace

  - it: should create multiple SAs for multiple deployments
    set:
      deployments:
        frontend:
          image: nginx:1.25
        backend:
          image: myapp:v1
    asserts:
      - hasDocuments:
          count: 2
