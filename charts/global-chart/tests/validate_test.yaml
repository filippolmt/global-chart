suite: name collision detection tests
templates:
  - templates/validate.yaml
tests:
  # ====== deployment name collision ======
  # Prefix "RELEASE-NAME-global-chart-" = 26 chars, leaving 37 chars for deployment name
  # "abcdefghij-klmnopqrst-uvwxyz-abcdefgh1" (39 chars) and "...gh2" both truncate to same 37 chars
  - it: should fail when two deployment names collide after truncation
    set:
      deployments:
        abcdefghij-klmnopqrst-uvwxyz-abcdefgh1:
          image: nginx:1.25
        abcdefghij-klmnopqrst-uvwxyz-abcdefgh2:
          image: nginx:1.25
    asserts:
      - failedTemplate:
          errorPattern: "Name collision: Deployment"

  - it: should not fail when deployment names are unique after truncation
    set:
      deployments:
        frontend:
          image: nginx:1.25
        backend:
          image: myapp:v2
    asserts:
      - hasDocuments:
          count: 0

  # ====== deployment-level CronJob collision ======
  # Both deployments: 27-char names + cronJob "m" = 29-char suffix, trunc to 26 = identical
  - it: should fail when deployment-level cronjob names collide after truncation
    set:
      deployments:
        abcdefghijklmnopqrstuvwxyz1:
          image: nginx:1.25
          cronJobs:
            m:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
        abcdefghijklmnopqrstuvwxyz2:
          image: nginx:1.25
          cronJobs:
            m:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
    asserts:
      - failedTemplate:
          errorPattern: "Name collision: CronJob"

  # ====== Collision tests: remaining types ======

  # --- Deploy-level hook Job collision (same deployment, same hook type, long job names) ---
  # depFullname = "RELEASE-NAME-global-chart-app" (29 chars)
  # hookJobName = "{depFullname}-pre-install-{jobName}" trunc 63
  # Prefix: 29 + 1 + 11 + 1 = 42 chars. Available for jobName: 63 - 42 = 21 chars.
  # Two 22-char job names (21 letters + digit) collide after trunc 63.
  - it: should fail when deploy-level hook Job names collide after truncation
    set:
      deployments:
        app:
          image: nginx:1.25
          hooks:
            pre-install:
              abcdefghijklmnopqrstu1:
                command: ["./migrate1.sh"]
              abcdefghijklmnopqrstu2:
                command: ["./migrate2.sh"]
    asserts:
      - failedTemplate:
          errorPattern: "Name collision: Job.*generated by hook"

  # --- Cross-source CronJob collision (root cronJob vs deploy-level cronJob) ---
  # Deploy-level: "RELEASE-NAME-global-chart-backend-cleanup" (41 chars, trunc 52 = 41)
  # Root-level:   "RELEASE-NAME-global-chart-backend-cleanup" (41 chars, trunc 52 = 41)
  # Deploy entry is registered first, root cronJob check finds collision.
  - it: should fail when root cronJob collides with deploy-level cronJob name
    set:
      deployments:
        backend:
          image: nginx:1.25
          cronJobs:
            cleanup:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
      cronJobs:
        backend-cleanup:
          schedule: "0 2 * * *"
          image: nginx:1.25
          command: ["./backup.sh"]
    asserts:
      - failedTemplate:
          errorPattern: "Name collision: CronJob.*generated by root cronJob"

  # --- Root-level CronJob collision (two root cronJobs with truncation) ---
  # Default release: fullname = "RELEASE-NAME-global-chart" (25 chars)
  # cronJobName = "{fullname}-{name}" trunc 52 => 26 + len(name) trunc 52
  # Available for name: 52 - 26 = 26 chars
  # Two 27-char names (26 letters + digit) collide after trunc 52
  - it: should fail when root-level cronjob names collide after truncation
    set:
      cronJobs:
        abcdefghijklmnopqrstuvwxyz1:
          schedule: "0 2 * * *"
          image: nginx:1.25
          command: ["./backup.sh"]
        abcdefghijklmnopqrstuvwxyz2:
          schedule: "0 2 * * *"
          image: nginx:1.25
          command: ["./backup.sh"]
    asserts:
      - failedTemplate:
          errorPattern: "Name collision: CronJob.*generated by root cronJob"

  # --- Root-level hook Job collision ---
  # Default release: fullname = "RELEASE-NAME-global-chart" (25 chars)
  # hookfullname = "{fullname}-{hookType}-{jobName}" trunc 63
  # With hookType "post-install" (12 chars): 25 + 1 + 12 + 1 = 39 prefix chars
  # Available for jobName: 63 - 39 = 24 chars
  # Two 25-char job names (24 letters + digit) collide after trunc 63
  - it: should fail when root-level hook Job names collide after truncation
    set:
      hooks:
        post-install:
          abcdefghijklmnopqrstuvwx1:
            image: nginx:1.25
            command: ["./setup.sh"]
          abcdefghijklmnopqrstuvwx2:
            image: nginx:1.25
            command: ["./setup.sh"]
    asserts:
      - failedTemplate:
          errorPattern: "Name collision: Job.*generated by root hook"

  # --- Cross-source hook Job collision (root hook vs deploy-level hook) ---
  # Deploy "pre-install" with hook type "pre-install", job "x":
  #   depFullname = "RELEASE-NAME-global-chart-pre-install" (37 chars)
  #   hookJob = "RELEASE-NAME-global-chart-pre-install-pre-install-x" (52 chars)
  # Root hook type "pre-install", job "pre-install-x":
  #   hookfullname = "RELEASE-NAME-global-chart-pre-install-pre-install-x" (52 chars)
  # Deploy hook is registered first, root hook check finds collision.
  - it: should fail when root hook collides with deploy-level hook name
    set:
      deployments:
        pre-install:
          image: nginx:1.25
          hooks:
            pre-install:
              x:
                command: ["./x.sh"]
      hooks:
        pre-install:
          pre-install-x:
            image: nginx:1.25
            command: ["./y.sh"]
    asserts:
      - failedTemplate:
          errorPattern: "Name collision: Job.*generated by root hook"

  # ====== Non-collision: false positive checks ======

  # Same hook command name across different hook types should NOT collide
  # because hook type is part of the Job name: {fullname}-{hookType}-{jobName}
  - it: should not fail when same hook name is used in different hook types
    set:
      deployments:
        app:
          image: nginx:1.25
          hooks:
            pre-install:
              migrate:
                command: ["./migrate.sh"]
            post-install:
              migrate:
                command: ["./migrate.sh"]
    asserts:
      - hasDocuments:
          count: 0

  # Root-level cronJob and deploy-level cronJob with DIFFERENT generated names should NOT collide
  - it: should not fail when root and deploy-level cronjobs produce different names
    set:
      deployments:
        backend:
          image: nginx:1.25
          cronJobs:
            cleanup:
              schedule: "0 4 * * *"
              command: ["./cleanup.sh"]
      cronJobs:
        daily-report:
          schedule: "0 2 * * *"
          image: nginx:1.25
          command: ["./report.sh"]
    asserts:
      - hasDocuments:
          count: 0
