suite: deployment template tests
templates:
  - templates/deployment.yaml
tests:
  # ====== enabled flag ======
  - it: should not render deployment when enabled is false
    set:
      deployments:
        main:
          enabled: false
          image: nginx:1.25
    asserts:
      - hasDocuments:
          count: 0

  - it: should render deployment when enabled is true
    set:
      deployments:
        main:
          enabled: true
          image: nginx:1.25
    asserts:
      - hasDocuments:
          count: 1

  - it: should render deployment when enabled is not set (default true)
    set:
      deployments:
        main:
          image: nginx:1.25
    asserts:
      - hasDocuments:
          count: 1

  # ====== extraContainers (Bug Fix #1) ======
  - it: should render extraContainers as sidecar
    set:
      deployments:
        main:
          image: nginx:1.25
          extraContainers:
            - name: sidecar
              image: busybox:1.28
              command: ["sh", "-c", "echo sidecar"]
    asserts:
      - contains:
          path: spec.template.spec.containers
          content:
            name: sidecar
            image: busybox:1.28
            command: ["sh", "-c", "echo sidecar"]

  - it: should not render extraContainers when not set
    set:
      deployments:
        main:
          image: nginx:1.25
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 1

  # ====== securityContext container-level (Bug Fix #2) ======
  - it: should render container-level securityContext
    set:
      deployments:
        main:
          image: nginx:1.25
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            readOnlyRootFilesystem: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 1000
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true

  - it: should not render container securityContext when not set
    set:
      deployments:
        main:
          image: nginx:1.25
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].securityContext

  # ====== additionalEnvs (Bug Fix #3) ======
  - it: should render additionalEnvs with valueFrom
    set:
      deployments:
        main:
          image: nginx:1.25
          additionalEnvs:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name

  - it: should render additionalEnvs with literal value
    set:
      deployments:
        main:
          image: nginx:1.25
          additionalEnvs:
            - name: MY_VAR
              value: "hello"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MY_VAR
            value: "hello"

  - it: should render additionalEnvs mixing value and valueFrom
    set:
      deployments:
        main:
          image: nginx:1.25
          additionalEnvs:
            - name: LITERAL
              value: "world"
            - name: FROM_SECRET
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: password
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers[0].env
          count: 2

  # ====== podSecurityContext ======
  - it: should render podSecurityContext
    set:
      deployments:
        main:
          image: nginx:1.25
          podSecurityContext:
            fsGroup: 2000
            runAsGroup: 3000
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 2000
      - equal:
          path: spec.template.spec.securityContext.runAsGroup
          value: 3000

  # ====== extraInitContainers ======
  - it: should render extraInitContainers
    set:
      deployments:
        main:
          image: nginx:1.25
          extraInitContainers:
            - name: init-db
              image: busybox:1.28
              command: ["sh", "-c", "echo init"]
    asserts:
      - contains:
          path: spec.template.spec.initContainers
          content:
            name: init-db
            image: busybox:1.28
            command: ["sh", "-c", "echo init"]

  - it: should render extraInitContainers with full spec
    set:
      deployments:
        main:
          image: nginx:1.25
          extraInitContainers:
            - name: init-db
              image: busybox:1.36
              command: ["sh", "-c", "echo init"]
              env:
                - name: DB_HOST
                  value: postgres
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: init-db
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: busybox:1.36
      - equal:
          path: spec.template.spec.initContainers[0].command[0]
          value: sh
      - equal:
          path: spec.template.spec.initContainers[0].env[0].name
          value: DB_HOST

  - it: should not render initContainers when extraInitContainers not set
    set:
      deployments:
        main:
          image: nginx:1.25
    asserts:
      - notExists:
          path: spec.template.spec.initContainers

  # ====== image with digest ======
  - it: should render image with digest
    set:
      deployments:
        main:
          image:
            repository: nginx
            digest: sha256:abc123
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "nginx@sha256:abc123"

  # ====== resources ======
  - it: should render resources
    set:
      deployments:
        main:
          image: nginx:1.25
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 512Mi

  # ====== probes ======
  - it: should render liveness and readiness probes
    set:
      deployments:
        main:
          image: nginx:1.25
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /ready

  - it: should render startupProbe when configured
    set:
      deployments:
        main:
          image: nginx:1.25
          startupProbe:
            httpGet:
              path: /startup
              port: http
            failureThreshold: 30
            periodSeconds: 10
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /startup
      - equal:
          path: spec.template.spec.containers[0].startupProbe.failureThreshold
          value: 30
      - equal:
          path: spec.template.spec.containers[0].startupProbe.periodSeconds
          value: 10

  - it: should not render probes when not configured
    set:
      deployments:
        main:
          image: nginx:1.25
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].livenessProbe
      - notExists:
          path: spec.template.spec.containers[0].readinessProbe
      - notExists:
          path: spec.template.spec.containers[0].startupProbe

  - it: should render all three probe types simultaneously
    set:
      deployments:
        main:
          image: nginx:1.25
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
          startupProbe:
            exec:
              command: ["/bin/check"]
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.tcpSocket.port
          value: 8080
      - equal:
          path: spec.template.spec.containers[0].startupProbe.exec.command[0]
          value: /bin/check

  # ====== envFrom ======
  - it: should render envFrom with configMap and secret
    set:
      deployments:
        main:
          image: nginx:1.25
          configMap:
            KEY: value
          secret:
            PASSWORD: secret
          envFromConfigMaps:
            - external-cm
          envFromSecrets:
            - external-secret
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].envFrom

  # ====== replicas with autoscaling ======
  - it: should not set replicas when autoscaling is enabled
    set:
      deployments:
        main:
          image: nginx:1.25
          autoscaling:
            enabled: true
            minReplicas: 2
            maxReplicas: 10
    asserts:
      - isNull:
          path: spec.replicas

  - it: should set replicas when autoscaling is disabled
    set:
      deployments:
        main:
          image: nginx:1.25
          replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  # ====== deployment naming ======
  - it: should name deployment correctly
    release:
      name: myrelease
    set:
      deployments:
        api:
          image: nginx:1.25
    asserts:
      - equal:
          path: metadata.name
          value: myrelease-global-chart-api

  # ====== selector labels include component ======
  - it: should include component in selector labels
    set:
      deployments:
        web:
          image: nginx:1.25
    asserts:
      - isSubset:
          path: spec.selector.matchLabels
          content:
            app.kubernetes.io/component: web

  # ====== nodeSelector, tolerations, affinity ======
  - it: should render nodeSelector
    set:
      deployments:
        main:
          image: nginx:1.25
          nodeSelector:
            disktype: ssd
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: ssd

  - it: should render tolerations
    set:
      deployments:
        main:
          image: nginx:1.25
          tolerations:
            - key: "dedicated"
              operator: "Equal"
              value: "special"
              effect: "NoSchedule"
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: "dedicated"
            operator: "Equal"
            value: "special"
            effect: "NoSchedule"

  # ====== volumeMounts ======
  - it: should render volumeMounts and volumes
    set:
      deployments:
        main:
          image: nginx:1.25
          volumes:
            - name: data
              type: emptyDir
          volumeMounts:
            - name: data
              mountPath: /data
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /data
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            emptyDir: {}

  # ====== native volume spec ======
  - it: should render native volume spec (no .type field)
    set:
      deployments:
        main:
          image: "nginx:1.25"
          volumes:
            - name: data
              hostPath:
                path: /data
                type: DirectoryOrCreate
            - name: downward
              downwardAPI:
                items:
                  - path: labels
                    fieldRef:
                      fieldPath: metadata.labels
          volumeMounts:
            - name: data
              mountPath: /data
            - name: downward
              mountPath: /etc/podinfo
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].name
          value: data
      - equal:
          path: spec.template.spec.volumes[0].hostPath.path
          value: /data
      - equal:
          path: spec.template.spec.volumes[1].name
          value: downward
      - exists:
          path: spec.template.spec.volumes[1].downwardAPI

  - it: should still render legacy .type volume spec (backward compat)
    set:
      deployments:
        main:
          image: "nginx:1.25"
          volumes:
            - name: myvolume
              type: secret
              secret:
                secretName: my-secret
            - name: myvolume2
              type: configMap
              configMap:
                name: my-config
          volumeMounts:
            - name: myvolume
              mountPath: /etc/secret
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].name
          value: myvolume
      - equal:
          path: spec.template.spec.volumes[0].secret.secretName
          value: my-secret
      - equal:
          path: spec.template.spec.volumes[1].name
          value: myvolume2
      - equal:
          path: spec.template.spec.volumes[1].configMap.name
          value: my-config

  # ====== resources handling ======
  - it: should not render resources key when not specified
    set:
      deployments:
        main:
          image: "nginx:1.25"
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].resources

  - it: should render resources when specified
    set:
      deployments:
        main:
          image: "nginx:1.25"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m

  # ====== secret checksum ======
  - it: should include secret checksum in pod annotations
    set:
      deployments:
        main:
          image: "nginx:1.25"
          secret:
            DB_PASSWORD: "s3cret"
    asserts:
      - exists:
          path: spec.template.metadata.annotations.checksum/secret

  # ====== strategy ======
  - it: should render strategy when configured
    set:
      deployments:
        main:
          image: "nginx:1.25"
          strategy:
            type: RollingUpdate
            rollingUpdate:
              maxSurge: 1
              maxUnavailable: 0
    asserts:
      - equal:
          path: spec.strategy.type
          value: RollingUpdate
      - equal:
          path: spec.strategy.rollingUpdate.maxSurge
          value: 1

  - it: should not render strategy when not configured
    set:
      deployments:
        main:
          image: "nginx:1.25"
    asserts:
      - notExists:
          path: spec.strategy

  # ====== revisionHistoryLimit ======
  - it: should render revisionHistoryLimit when configured
    set:
      deployments:
        main:
          image: "nginx:1.25"
          revisionHistoryLimit: 3
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 3

  - it: should not render revisionHistoryLimit when not configured
    set:
      deployments:
        main:
          image: "nginx:1.25"
    asserts:
      - notExists:
          path: spec.revisionHistoryLimit

  # ====== progressDeadlineSeconds ======
  - it: should render progressDeadlineSeconds when configured
    set:
      deployments:
        main:
          image: "nginx:1.25"
          progressDeadlineSeconds: 120
    asserts:
      - equal:
          path: spec.progressDeadlineSeconds
          value: 120

  - it: should not render progressDeadlineSeconds when not configured
    set:
      deployments:
        main:
          image: "nginx:1.25"
    asserts:
      - notExists:
          path: spec.progressDeadlineSeconds

  # ====== topologySpreadConstraints ======
  - it: should render topologySpreadConstraints when configured
    set:
      deployments:
        main:
          image: "nginx:1.25"
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: topology.kubernetes.io/zone
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app: web
    asserts:
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].maxSkew
          value: 1
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].topologyKey
          value: topology.kubernetes.io/zone

  - it: should not render topologySpreadConstraints when not configured
    set:
      deployments:
        main:
          image: "nginx:1.25"
    asserts:
      - notExists:
          path: spec.template.spec.topologySpreadConstraints

  # ====== global values ======
  - it: should prepend global.imageRegistry to image
    set:
      global:
        imageRegistry: registry.example.com
      deployments:
        main:
          image:
            repository: myapp
            tag: "v1"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "registry.example.com/myapp:v1"

  - it: should not prepend imageRegistry when not set
    set:
      deployments:
        main:
          image:
            repository: myapp
            tag: "v1"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "myapp:v1"

  - it: should use global.imagePullSecrets when deployment has none
    set:
      global:
        imagePullSecrets:
          - name: global-regcred
      deployments:
        main:
          image: "nginx:1.25"
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: "global-regcred"

  - it: should prefer deployment imagePullSecrets over global
    set:
      global:
        imagePullSecrets:
          - name: global-regcred
      deployments:
        main:
          image: "nginx:1.25"
          imagePullSecrets:
            - name: local-regcred
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: "local-regcred"

  # ====== falsy-safe replicaCount (hasKey) ======
  - it: should render replicaCount 0 when explicitly set
    set:
      deployments:
        main:
          image: nginx:1.25
          replicaCount: 0
    asserts:
      - equal:
          path: spec.replicas
          value: 0

  - it: should skip global imageRegistry when string image already contains a registry
    set:
      global:
        imageRegistry: registry.example.com
      deployments:
        main:
          image: "docker.io/nginx:1.25"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/nginx:1.25"

  # ====== Deployment field gap closure ======

  - it: should render affinity when set on deployment
    set:
      deployments:
        main:
          image: nginx:1.25
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: zone
                        operator: In
                        values: ["us-east-1a"]
    asserts:
      - isNotNull:
          path: spec.template.spec.affinity.nodeAffinity
      - equal:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].key
          value: zone
      - equal:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].operator
          value: In

  - it: should not use global.imagePullSecrets when deployment sets empty list
    set:
      global:
        imagePullSecrets:
          - name: global-regcred
      deployments:
        main:
          image: nginx:1.25
          imagePullSecrets: []
    asserts:
      - isNull:
          path: spec.template.spec.imagePullSecrets

  # ====== Negative tests: fail/required paths ======
  # NOTE: Deploy-level CronJob/Hook image-required checks (cronjob.yaml:175, hook.yaml:259)
  # are unreachable in practice because deployment.yaml catches missing image first. Skipped.

  - it: should fail when image map has repository but no tag or digest
    set:
      deployments:
        main:
          image:
            repository: myapp/api
    asserts:
      - failedTemplate:
          errorMessage: "deployments.main.image requires either a tag or digest when repository is provided"

  - it: should fail when image is nil
    set:
      deployments:
        main:
          image: null
    asserts:
      - failedTemplate:
          errorMessage: "deployments.main.image must define a repository with tag/digest or be a full image reference"

  - it: should fail when volume uses unknown legacy type
    set:
      deployments:
        main:
          image: "nginx:1.25"
          volumes:
            - name: myvol
              type: nfs
          volumeMounts:
            - name: myvol
              mountPath: /mnt
    asserts:
      - failedTemplate:
          errorPattern: "renderVolume: unknown legacy volume type 'nfs'"

  - it: should fail when imagePullSecrets entry has no name key
    set:
      deployments:
        main:
          image: "nginx:1.25"
          imagePullSecrets:
            - badkey: value
    asserts:
      - failedTemplate:
          errorMessage: "imagePullSecrets must be a list of strings or objects with a 'name' key."
