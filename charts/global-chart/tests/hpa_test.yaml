suite: hpa template tests
templates:
  - templates/hpa.yaml
tests:
  # ====== Deployment enabled flag ======
  - it: should not render HPA when deployment enabled is false
    set:
      deployments:
        main:
          enabled: false
          image: nginx:1.25
          autoscaling:
            enabled: true
            minReplicas: 1
            maxReplicas: 5
            targetCPUUtilizationPercentage: 80
    asserts:
      - hasDocuments:
          count: 0

  # ====== Nil safety: deployment without autoscaling key ======
  - it: should not render HPA when autoscaling is not defined
    set:
      deployments:
        main:
          image: nginx:1.25
    asserts:
      - hasDocuments:
          count: 0

  # ====== Nil safety: autoscaling enabled without metrics ======
  - it: should not render HPA when enabled but no metrics set
    set:
      deployments:
        main:
          image: nginx:1.25
          autoscaling:
            enabled: true
            minReplicas: 2
            maxReplicas: 5
    asserts:
      - hasDocuments:
          count: 0

  # ====== Basic HPA with CPU metric ======
  - it: should render HPA with CPU metric
    set:
      deployments:
        main:
          image: nginx:1.25
          autoscaling:
            enabled: true
            minReplicas: 2
            maxReplicas: 10
            targetCPUUtilizationPercentage: 80
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 10
      - equal:
          path: spec.metrics[0].resource.name
          value: cpu
      - equal:
          path: spec.metrics[0].resource.target.averageUtilization
          value: 80

  # ====== HPA with both CPU and Memory metrics ======
  - it: should render HPA with both CPU and memory metrics
    set:
      deployments:
        main:
          image: nginx:1.25
          autoscaling:
            enabled: true
            minReplicas: 1
            maxReplicas: 5
            targetCPUUtilizationPercentage: 70
            targetMemoryUtilizationPercentage: 85
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler
      - equal:
          path: spec.metrics[0].resource.name
          value: cpu
      - equal:
          path: spec.metrics[1].resource.name
          value: memory

  # ====== Negative tests: fail/required paths ======

  - it: should fail when autoscaling.minReplicas is not set
    set:
      deployments:
        main:
          image: nginx:1.25
          autoscaling:
            enabled: true
            maxReplicas: 10
            targetCPUUtilizationPercentage: 80
    asserts:
      - failedTemplate:
          errorMessage: "deployments.main.autoscaling.minReplicas is required when HPA is enabled"

  - it: should fail when autoscaling.maxReplicas is not set
    set:
      deployments:
        main:
          image: nginx:1.25
          autoscaling:
            enabled: true
            minReplicas: 2
            targetCPUUtilizationPercentage: 80
    asserts:
      - failedTemplate:
          errorMessage: "deployments.main.autoscaling.maxReplicas is required when HPA is enabled"
