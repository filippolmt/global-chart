suite: service template tests
templates:
  - templates/service.yaml
tests:
  # ====== Deployment enabled flag ======
  - it: should not render service when deployment enabled is false
    set:
      deployments:
        main:
          enabled: false
          image: nginx:1.25
    asserts:
      - hasDocuments:
          count: 0

  # ====== Service disabled ======
  - it: should not render service when disabled
    set:
      deployments:
        worker:
          image: nginx:1.25
          service:
            enabled: false
    asserts:
      - hasDocuments:
          count: 0

  # ====== Service enabled by default ======
  - it: should render service by default
    release:
      name: myrel
    set:
      deployments:
        main:
          image: nginx:1.25
          service:
            port: 8080
            targetPort: 8080
            type: ClusterIP
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 8080
      - equal:
          path: spec.ports[0].targetPort
          value: 8080

  # ====== Service naming ======
  - it: should name service after deployment
    release:
      name: myrel
    set:
      deployments:
        api:
          image: nginx:1.25
    asserts:
      - equal:
          path: metadata.name
          value: myrel-global-chart-api

  # ====== Service selector labels ======
  - it: should include component in selector labels
    set:
      deployments:
        backend:
          image: nginx:1.25
    asserts:
      - isSubset:
          path: spec.selector
          content:
            app.kubernetes.io/component: backend

  # ====== Default port ======
  - it: should use default port 80 when not specified
    set:
      deployments:
        main:
          image: nginx:1.25
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 80

  # ====== Multiple deployments create multiple services ======
  - it: should create service for each deployment
    set:
      deployments:
        frontend:
          image: nginx:1.25
          service:
            port: 80
        backend:
          image: myapp:v1
          service:
            port: 3000
    asserts:
      - hasDocuments:
          count: 2

  # ====== Port name ======
  - it: should use custom port name
    set:
      deployments:
        main:
          image: nginx:1.25
          service:
            portName: api
            port: 3000
    asserts:
      - equal:
          path: spec.ports[0].name
          value: api

  # ====== per-service annotations with global commonAnnotations ======
  - it: should merge per-service annotations with global commonAnnotations
    set:
      global:
        commonAnnotations:
          managed-by: helm
      deployments:
        main:
          image: nginx:1.25
          service:
            annotations:
              custom-annotation: my-value
    asserts:
      - equal:
          path: metadata.annotations.managed-by
          value: helm
      - equal:
          path: metadata.annotations.custom-annotation
          value: my-value

  - it: should render only per-service annotations when no commonAnnotations
    set:
      deployments:
        main:
          image: nginx:1.25
          service:
            annotations:
              custom-annotation: my-value
    asserts:
      - equal:
          path: metadata.annotations.custom-annotation
          value: my-value

  - it: should let per-service annotations override global commonAnnotations
    set:
      global:
        commonAnnotations:
          shared-key: global-value
      deployments:
        main:
          image: nginx:1.25
          service:
            annotations:
              shared-key: service-value
    asserts:
      - equal:
          path: metadata.annotations.shared-key
          value: service-value

  # ====== global.commonLabels ======
  - it: should render global.commonLabels on service metadata
    set:
      global:
        commonLabels:
          team: platform
      deployments:
        main:
          image: nginx:1.25
    asserts:
      - equal:
          path: metadata.labels.team
          value: platform

  # ====== extraPorts ======
  - it: should render extraPorts after primary port
    set:
      deployments:
        odoo:
          image: odoo:17
          service:
            port: 8069
            targetPort: 8069
            portName: odoo
            extraPorts:
              - name: gevent
                port: 8072
                targetPort: 8072
              - name: metrics
                port: 9090
                targetPort: 9090
                protocol: TCP
                appProtocol: http
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8069
      - equal:
          path: spec.ports[0].name
          value: odoo
      - equal:
          path: spec.ports[1].name
          value: gevent
      - equal:
          path: spec.ports[1].port
          value: 8072
      - equal:
          path: spec.ports[1].targetPort
          value: 8072
      - equal:
          path: spec.ports[1].protocol
          value: TCP
      - equal:
          path: spec.ports[2].name
          value: metrics
      - equal:
          path: spec.ports[2].appProtocol
          value: http
      - lengthEqual:
          path: spec.ports
          count: 3

  - it: should default extraPorts protocol to TCP when omitted
    set:
      deployments:
        main:
          image: nginx:1.25
          service:
            extraPorts:
              - name: extra
                port: 5353
                targetPort: 5353
    asserts:
      - equal:
          path: spec.ports[1].protocol
          value: TCP

  - it: should render UDP protocol on extraPorts when specified
    set:
      deployments:
        main:
          image: nginx:1.25
          service:
            extraPorts:
              - name: dns
                port: 5353
                targetPort: 5353
                protocol: UDP
    asserts:
      - equal:
          path: spec.ports[1].protocol
          value: UDP

  - it: should render nodePort on extraPorts when set
    set:
      deployments:
        main:
          image: nginx:1.25
          service:
            type: NodePort
            extraPorts:
              - name: extra
                port: 8081
                targetPort: 8081
                nodePort: 30081
    asserts:
      - equal:
          path: spec.ports[1].nodePort
          value: 30081

  - it: should accept named targetPort in extraPorts
    set:
      deployments:
        main:
          image: nginx:1.25
          service:
            extraPorts:
              - name: ws
                port: 8072
                targetPort: gevent
    asserts:
      - equal:
          path: spec.ports[1].targetPort
          value: gevent

  - it: should render only primary port when extraPorts omitted
    set:
      deployments:
        main:
          image: nginx:1.25
          service:
            port: 8080
            targetPort: 8080
    asserts:
      - lengthEqual:
          path: spec.ports
          count: 1
      - equal:
          path: spec.ports[0].port
          value: 8080
