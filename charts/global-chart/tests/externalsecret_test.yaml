suite: externalsecret template tests
templates:
  - templates/externalsecret.yaml
tests:
  - it: should not render when externalSecrets is empty
    set:
      externalSecrets: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ExternalSecret with required fields
    set:
      externalSecrets:
        my-secret:
          secretkey: password
          remote:
            key: /prod/db/password
          secretstore:
            kind: ClusterSecretStore
            name: aws-secrets-manager
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: spec.data[0].remoteRef.key
          value: "/prod/db/password"
      - equal:
          path: spec.data[0].secretKey
          value: "password"
      - equal:
          path: spec.secretStoreRef.kind
          value: "ClusterSecretStore"
      - equal:
          path: spec.secretStoreRef.name
          value: "aws-secrets-manager"

  - it: should use default values for optional fields
    set:
      externalSecrets:
        my-secret:
          secretkey: password
          remote:
            key: /prod/db/password
          secretstore:
            kind: ClusterSecretStore
            name: aws-sm
    asserts:
      - equal:
          path: spec.refreshInterval
          value: "1h"
      - equal:
          path: spec.target.creationPolicy
          value: "Owner"
      - equal:
          path: spec.target.deletionPolicy
          value: "Retain"
      - equal:
          path: spec.data[0].remoteRef.conversionStrategy
          value: "Default"
      - equal:
          path: spec.data[0].remoteRef.decodingStrategy
          value: "None"

  - it: should fail when remote.key is missing
    set:
      externalSecrets:
        my-secret:
          secretkey: password
          remote: {}
          secretstore:
            kind: ClusterSecretStore
            name: aws-sm
    asserts:
      - failedTemplate:
          errorMessage: "externalSecrets.my-secret.remote.key is mandatory"

  - it: should render multiple ExternalSecrets
    set:
      externalSecrets:
        secret-one:
          secretkey: key1
          remote:
            key: /path/one
          secretstore:
            kind: SecretStore
            name: store1
        secret-two:
          secretkey: key2
          remote:
            key: /path/two
          secretstore:
            kind: SecretStore
            name: store2
    asserts:
      - hasDocuments:
          count: 2

  # ====== Regression: truncation guard on ExternalSecret names (TMPL-03) ======
  - it: should truncate ExternalSecret name to 63 chars when combined name exceeds limit
    release:
      name: my-very-long-release-name-for-testing
    set:
      externalSecrets:
        a-very-long-external-secret-name-that-pushes-over-the-limit:
          secretkey: password
          remote:
            key: /prod/db/password
          secretstore:
            kind: ClusterSecretStore
            name: aws-sm
    asserts:
      - isKind:
          of: ExternalSecret
      - matchRegex:
          path: metadata.name
          pattern: "^.{1,63}$"
