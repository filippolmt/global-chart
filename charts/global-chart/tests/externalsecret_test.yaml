suite: externalsecret template tests
templates:
  - templates/externalsecret.yaml
tests:
  - it: should not render when externalSecrets is empty
    set:
      externalSecrets: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ExternalSecret with required fields
    set:
      externalSecrets:
        my-secret:
          secretkey: password
          remote:
            key: /prod/db/password
          secretstore:
            kind: ClusterSecretStore
            name: aws-secrets-manager
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: spec.data[0].remoteRef.key
          value: "/prod/db/password"
      - equal:
          path: spec.data[0].secretKey
          value: "password"
      - equal:
          path: spec.secretStoreRef.kind
          value: "ClusterSecretStore"
      - equal:
          path: spec.secretStoreRef.name
          value: "aws-secrets-manager"

  - it: should use default values for optional fields
    set:
      externalSecrets:
        my-secret:
          secretkey: password
          remote:
            key: /prod/db/password
          secretstore:
            kind: ClusterSecretStore
            name: aws-sm
    asserts:
      - equal:
          path: spec.refreshInterval
          value: "1h"
      - equal:
          path: spec.target.creationPolicy
          value: "Owner"
      - equal:
          path: spec.target.deletionPolicy
          value: "Retain"
      - equal:
          path: spec.data[0].remoteRef.conversionStrategy
          value: "Default"
      - equal:
          path: spec.data[0].remoteRef.decodingStrategy
          value: "None"

  - it: should fail when remote.key is missing
    set:
      externalSecrets:
        my-secret:
          secretkey: password
          remote: {}
          secretstore:
            kind: ClusterSecretStore
            name: aws-sm
    asserts:
      - failedTemplate:
          errorMessage: "externalSecrets.my-secret.remote.key is mandatory"

  - it: should render multiple ExternalSecrets
    set:
      externalSecrets:
        secret-one:
          secretkey: key1
          remote:
            key: /path/one
          secretstore:
            kind: SecretStore
            name: store1
        secret-two:
          secretkey: key2
          remote:
            key: /path/two
          secretstore:
            kind: SecretStore
            name: store2
    asserts:
      - hasDocuments:
          count: 2

  # ====== Negative tests: fail/required paths ======

  - it: should fail when remote is missing
    set:
      externalSecrets:
        my-secret:
          secretkey: password
          secretstore:
            kind: ClusterSecretStore
            name: aws-sm
    asserts:
      - failedTemplate:
          errorPattern: "externalSecrets.my-secret.remote is mandatory"

  - it: should fail when secretstore is missing
    set:
      externalSecrets:
        my-secret:
          secretkey: password
          remote:
            key: /prod/db/password
    asserts:
      - failedTemplate:
          errorPattern: "externalSecrets.my-secret.secretstore is mandatory"

  - it: should fail when secretkey is missing
    set:
      externalSecrets:
        my-secret:
          remote:
            key: /prod/db/password
          secretstore:
            kind: ClusterSecretStore
            name: aws-sm
    asserts:
      - failedTemplate:
          errorMessage: "secretkey is mandatory"

  - it: should fail when secretstore.kind is missing
    set:
      externalSecrets:
        my-secret:
          secretkey: password
          remote:
            key: /prod/db/password
          secretstore:
            name: aws-sm
    asserts:
      - failedTemplate:
          errorPattern: "externalSecrets.my-secret.secretstore.kind is mandatory"

  - it: should fail when secretstore.name is missing
    set:
      externalSecrets:
        my-secret:
          secretkey: password
          remote:
            key: /prod/db/password
          secretstore:
            kind: ClusterSecretStore
    asserts:
      - failedTemplate:
          errorPattern: "externalSecrets.my-secret.secretstore.name is mandatory"

  # ====== data list form (many keys, one Secret) ======

  - it: should render multiple data entries from the data list
    set:
      externalSecrets:
        app:
          secretstore:
            kind: ClusterSecretStore
            name: my-store
          data:
            - secretkey: DB_PASSWORD
              remote:
                key: MY_DB_PASSWORD
            - secretkey: API_TOKEN
              remote:
                key: MY_API_TOKEN
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: spec.data[0].secretKey
          value: "DB_PASSWORD"
      - equal:
          path: spec.data[0].remoteRef.key
          value: "MY_DB_PASSWORD"
      - equal:
          path: spec.data[1].secretKey
          value: "API_TOKEN"
      - equal:
          path: spec.data[1].remoteRef.key
          value: "MY_API_TOKEN"
      - notExists:
          path: spec.dataFrom

  - it: should apply default strategies to data list items
    set:
      externalSecrets:
        app:
          secretstore:
            kind: ClusterSecretStore
            name: my-store
          data:
            - secretkey: DB_PASSWORD
              remote:
                key: MY_DB_PASSWORD
    asserts:
      - equal:
          path: spec.data[0].remoteRef.conversionStrategy
          value: "Default"
      - equal:
          path: spec.data[0].remoteRef.decodingStrategy
          value: "None"
      - equal:
          path: spec.data[0].remoteRef.metadataPolicy
          value: "None"

  - it: should render both data and dataFrom when both are set
    set:
      externalSecrets:
        app:
          secretstore:
            kind: ClusterSecretStore
            name: my-store
          data:
            - secretkey: DB_PASSWORD
              remote:
                key: MY_DB_PASSWORD
          dataFrom:
            - find:
                name:
                  regexp: "^APP_.*"
    asserts:
      - equal:
          path: spec.data[0].secretKey
          value: "DB_PASSWORD"
      - equal:
          path: spec.dataFrom[0].find.name.regexp
          value: "^APP_.*"

  - it: should not fall through to the legacy branch on an empty data list
    set:
      externalSecrets:
        app:
          secretstore:
            kind: ClusterSecretStore
            name: my-store
          data: []
    asserts:
      - isKind:
          of: ExternalSecret
      - notExists:
          path: spec.data[0]

  - it: should fail when single-key form is combined with data
    set:
      externalSecrets:
        app:
          secretstore:
            kind: ClusterSecretStore
            name: my-store
          secretkey: DB_PASSWORD
          remote:
            key: MY_DB_PASSWORD
          data:
            - secretkey: API_TOKEN
              remote:
                key: MY_API_TOKEN
    asserts:
      - failedTemplate:
          errorPattern: "single-key form .* cannot be combined with 'data' or 'dataFrom'"

  - it: should fail when a data item is missing remote.key
    set:
      externalSecrets:
        app:
          secretstore:
            kind: ClusterSecretStore
            name: my-store
          data:
            - secretkey: DB_PASSWORD
              remote: {}
    asserts:
      - failedTemplate:
          errorPattern: "externalSecrets.app.data\\[\\].remote.key is mandatory"

  - it: should fail when a data item is missing secretkey
    set:
      externalSecrets:
        app:
          secretstore:
            kind: ClusterSecretStore
            name: my-store
          data:
            - remote:
                key: MY_DB_PASSWORD
    asserts:
      - failedTemplate:
          errorPattern: "externalSecrets.app.data\\[\\].secretkey is mandatory"

  # ====== dataFrom form (extract / find) ======

  - it: should render dataFrom verbatim and omit data
    set:
      externalSecrets:
        app:
          secretstore:
            kind: ClusterSecretStore
            name: my-store
          dataFrom:
            - find:
                name:
                  regexp: "^APP_.*"
            - extract:
                key: shared/app
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: spec.dataFrom[0].find.name.regexp
          value: "^APP_.*"
      - equal:
          path: spec.dataFrom[1].extract.key
          value: "shared/app"
      - notExists:
          path: spec.data
