suite: networkpolicy template tests
templates:
  - templates/networkpolicy.yaml
tests:
  - it: should not render NetworkPolicy by default
    set:
      deployments:
        main:
          image: "nginx:1.25"
    asserts:
      - hasDocuments:
          count: 0

  - it: should render NetworkPolicy when enabled
    set:
      deployments:
        main:
          image: "nginx:1.25"
          networkPolicy:
            enabled: true
            ingress:
              - from:
                  - podSelector: {}
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: apiVersion
          value: networking.k8s.io/v1
      - equal:
          path: kind
          value: NetworkPolicy

  - it: should use correct pod selector labels
    set:
      deployments:
        main:
          image: "nginx:1.25"
          networkPolicy:
            enabled: true
            ingress:
              - from:
                  - podSelector: {}
    asserts:
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/component"]
          value: main

  - it: should render ingress rules when specified
    set:
      deployments:
        main:
          image: "nginx:1.25"
          networkPolicy:
            enabled: true
            ingress:
              - from:
                  - namespaceSelector:
                      matchLabels:
                        name: ingress-nginx
                ports:
                  - port: 8080
                    protocol: TCP
    asserts:
      - equal:
          path: spec.ingress[0].from[0].namespaceSelector.matchLabels.name
          value: ingress-nginx
      - equal:
          path: spec.ingress[0].ports[0].port
          value: 8080

  - it: should render egress rules when specified
    set:
      deployments:
        main:
          image: "nginx:1.25"
          networkPolicy:
            enabled: true
            egress:
              - to:
                  - ipBlock:
                      cidr: 10.0.0.0/8
                ports:
                  - port: 5432
                    protocol: TCP
    asserts:
      - equal:
          path: spec.egress[0].to[0].ipBlock.cidr
          value: 10.0.0.0/8

  - it: should render policyTypes based on rules
    set:
      deployments:
        main:
          image: "nginx:1.25"
          networkPolicy:
            enabled: true
            ingress:
              - from:
                  - podSelector: {}
            egress:
              - to:
                  - podSelector: {}
    asserts:
      - contains:
          path: spec.policyTypes
          content: Ingress
      - contains:
          path: spec.policyTypes
          content: Egress

  - it: should fail when enabled with no rules and no policyTypes
    set:
      deployments:
        main:
          image: "nginx:1.25"
          networkPolicy:
            enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "NetworkPolicy for deployment 'main': at least one of policyTypes, ingress, or egress must be set when networkPolicy.enabled is true."

  - it: should render explicit policyTypes when provided
    set:
      deployments:
        main:
          image: "nginx:1.25"
          networkPolicy:
            enabled: true
            policyTypes:
              - Ingress
              - Egress
            ingress:
              - from:
                  - podSelector: {}
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: spec.policyTypes
          content: Ingress
      - contains:
          path: spec.policyTypes
          content: Egress

  - it: should render policyTypes for default deny with explicit policyTypes
    set:
      deployments:
        main:
          image: "nginx:1.25"
          networkPolicy:
            enabled: true
            policyTypes:
              - Ingress
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: spec.policyTypes
          content: Ingress

  - it: should not render NetworkPolicy when enabled is false
    set:
      deployments:
        main:
          image: "nginx:1.25"
          networkPolicy:
            enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render NetworkPolicy for disabled deployment
    set:
      deployments:
        main:
          enabled: false
          image: "nginx:1.25"
          networkPolicy:
            enabled: true
            ingress:
              - from:
                  - podSelector: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should render NetworkPolicy for multiple deployments
    set:
      deployments:
        frontend:
          image: "nginx:1.25"
          networkPolicy:
            enabled: true
            ingress:
              - from:
                  - podSelector: {}
        backend:
          image: "myapp:v1"
          networkPolicy:
            enabled: true
            ingress:
              - from:
                  - podSelector: {}
    asserts:
      - hasDocuments:
          count: 2
