checks:
  addAllBuiltIn: true
  exclude:
    # Reusable chart: security context is consumer's responsibility
    - "no-read-only-root-fs"
    - "run-as-non-root"
    - "drop-net-raw-capability"
    # Reusable chart: probes are optional, consumer configures per workload
    - "no-readiness-probe"
    - "no-liveness-probe"
    # Reusable chart: strategy is configurable, not all deployments need rolling update
    - "no-rolling-update-strategy"
    # Reusable chart: resource limits are optional, consumer sets per workload
    - "unset-cpu-requirements"
    - "unset-memory-requirements"
    # Reusable chart: host mounts are valid for certain workloads
    - "writable-host-mount"
    # Reusable chart: anti-affinity, replicas and node affinity are consumer's choice
    - "no-anti-affinity"
    - "minimum-three-replicas"
    - "hpa-minimum-three-replicas"
    - "no-node-affinity"
    # Chart does not enforce owner labels/annotations (consumer's labeling strategy)
    - "required-label-owner"
    - "required-annotation-email"
    # Test scenarios use default namespace and default SA intentionally
    - "use-namespace"
    - "default-service-account"
    # SA names are dynamic (generated or inherited); linter can't resolve Helm expressions
    - "non-existent-service-account"
    # PDB unhealthyPodEvictionPolicy is K8s 1.27+ beta feature, not universally available
    - "pdb-unhealthy-pod-eviction-policy"
    # Test scenarios use placeholder images without explicit tags
    - "latest-tag"
    # Reusable chart: port binding and secret usage are consumer's responsibility
    - "privileged-ports"
    - "read-secret-from-env-var"
    # Reusable chart: RBAC, network isolation and DNS config are consumer's choice
    - "access-to-create-pods"
    - "non-isolated-pod"
    - "dnsconfig-options"
    # Ingress references are resolved at deploy time, not at lint time
    - "dangling-ingress"
