# ExternalSecrets only - no deployments
deployments: {}
externalSecrets:
  # Single-key form (one remote key -> one Secret key)
  app-config:
    secretkey: app-config
    remote:
      key: "apps/prod/config"
    secretstore:
      kind: ClusterSecretStore
      name: default-store
  # data list form: many keys collapsed into one Secret
  app:
    secretstore:
      kind: ClusterSecretStore
      name: default-store
    refreshInterval: 1h
    target:
      name: app-secrets
    data:
      - secretkey: DB_PASSWORD
        remote:
          key: MY_DB_PASSWORD
      - secretkey: API_TOKEN
        remote:
          key: MY_API_TOKEN
  # dataFrom form: extract / find
  app-bulk:
    secretstore:
      kind: ClusterSecretStore
      name: default-store
    dataFrom:
      - find:
          name:
            regexp: "^APP_.*"
  # data + dataFrom together (both rendered, ESO supports both)
  app-mixed:
    secretstore:
      kind: ClusterSecretStore
      name: default-store
    data:
      - secretkey: EXTRA_TOKEN
        remote:
          key: MY_EXTRA_TOKEN
    dataFrom:
      - extract:
          key: shared/app
